body:
  text: 明歷合正光歷後魏孝明帝時李業興等造距正光三年壬寅歲至萬歷二十二年甲午歲千七十二年以其法推正光三年天正冬至得已亥及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考正光三年天正冬至得已亥與正光歷合興和歷後魏孝靜帝時李業興等重造距興和二年庚申歲至萬歷二十二年甲午歲千五十四年以其法推興和二年天正冬至得甲戌及推萬歷二十二年天正冬至得辛已後天二日以大衍歷上考興和二年天正冬至得癸酉斯法與大衍同天保歷北齊文宣帝時宋景業造距天保元年庚午歲至萬歷二十二年甲午歲千四十四年以其法推天保元年天正冬至得丁卯及推萬歷二十二年天正冬至得壬午後天三日以大衍歷上考天保元年天正冬至得丙寅斯法
