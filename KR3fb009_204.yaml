body:
  text: 祐歷合會天歷宋理宗時談玉造距寶祐元年癸丑歲至萬歷二十二年甲午歲三百四十一年以其法推寶祐元年天正冬至得壬辰及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考寶祐元年天正冬至得壬辰與會天歷合成天歷宋度宗時陳鼎造距咸淳七年辛未歲至萬歷二十二年甲午歲三百二十三年以其法推咸淳七年天正冬至得丙寅與成天歷合授時歷元世祖時許等造距至元十八年辛已歲至萬歷二十二年甲午歲三百一十三年以其法推至元十八年天正冬至得已未日夜半後六刻及推萬歷二十二年天正冬至得已卯日八十六年刻先斯法四分刻之三以其法上考至元十八年天正冬至得已未日夜半後以刻與授時歷合
  hash: sha256:364618986bbdab02b828a7774b3a7e22cc1b76fd824e0af392f0ef850d53e674
