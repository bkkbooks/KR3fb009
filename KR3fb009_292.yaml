body:
  text: 生光丑正二刻五更一點復圓寅初四刻五更五點正西食甚月離黃道斗二十三度十六分赤道斗二十五度八分宋文帝元嘉二十八年八月十五日丁夜月食在奎十一度以衝計之日當在角二同上按此條不言食盡者食不至既也依斯法算距嘉靖甲寅歲一千一百三年距萬歷辛巳歲一千一百三十年月食七分三十秒初虧子正初刻三更三點東南食甚丑初二刻四更二點正南復圓寅初初刻四更五點西南食甚月離黃道奎十四度二十六分赤道奎十三度十五分依舊法算距至元辛巳歲八百三十年
