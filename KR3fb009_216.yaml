body:
  text: 大統壬辰七刻斯法已丑二十三刻右紀元後天一日授時先天一日大統後天三日餘與天合按南至晷景見於經傳者惟此二條而巳餘或見於讖緯等書若春秋命歷序之類即漢志隨志所引者今未敢以為據授時歷議據前漢志魯獻公十五年戊寅歲正月甲辰朔旦冬至引用此條為首蓋獻公乃隱公五祖其十五年戊寅歲下距隱公元年已禾歲百六十一年其非春秋時明矣而元志乃云春秋獻公以來者許郭諸儒多聞博古豈不知獻公在春秋前百餘年哉第以所推昭公已丑冬至而得戊子既不能合偶與獻公相合故援此以飾非而為之說云曲變歷法以從昭公則與獻公不合遂謂春秋所書昭公冬至乃日度失行之驗然則大衍宣明諸歷推之皆得已丑豈皆誤耶夫獻公甲寅冬至別無所據惟劉歆三統歷是據也若在左傳不足信而歆獨可信乎太初元年冬至在
  hash: sha256:ceebd5c99e2de976ec7c1b1aa76ee118dc0ccc72abc44919bcc6be85e9f2d6f2
