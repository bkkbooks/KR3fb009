body:
  text: 大統戊辰八十二刻斯法戊戌三十九刻右太初後天六日餘與天合隋開皇四年甲辰歲十一月十一日巳巳景長見隋志太初丙子空刻大衍已巳七十七刻紀元巳已六十九刻授時已已八十六刻大統庚午三十八刻斯法已巳八十五刻右太初後天七日大統後天一日餘與天合開皇五年乙已歲十一月二十二日乙亥景長同上太初辛巳二十五刻大衍乙亥一刻紀元甲戌九十三刻授時乙亥十刻大統乙亥五十二刻斯法乙亥十刻右太初後天六日紀元先天一日餘與天合開皇六年丙午歲十一月初三日庚辰景長同上太初丙戌五十刻大衍庚辰二十五刻紀元庚辰十八刻授時庚辰三十四刻大統庚辰七十六刻斯法庚辰三十四刻右太初後天六日餘與天合開皇七年丁未歲五月初九日癸未景短見隋志
