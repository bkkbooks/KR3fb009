body:
  text: 求定朔弦望夜半晨昏黃道月度置所求入轉日轉度率與次日轉度率相減轉以所求入轉小餘乘之萬約為分前多後少減前少後多加如減轉度率為轉定度以乘定朔弦望小餘萬約為分用減加時定積度餘為晨前夜半定積度以轉定度乘其日晨昏分萬約為分各加夜半定積度為晨昏定積度加命如前各得夜半晨昏黃道月度及分秒求每日夜半晨昏黃道月度纍計相距日數轉度率為轉積度與定朔弦望夜半相距度相減餘如相距日數而一為日差距度多為加距度少為減加減每日轉度率為行定度以纍加定朔弦望夜半定積度為每日夜半定積度纍加定朔弦望晨昏定積度為每日晨昏定積度為每日晨昏定積度加命如前即每日夜半晨昏黃道月度及分秒注歷自朔至望皆用昏度既望已後則用晨度求每日夜半晨昏赤道月度視所求夜半晨昏黃道月行定積度在象策巳下為
