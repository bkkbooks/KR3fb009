body:
  text: 法以其每年增損無定故不開列各隨歲差求而用之與彼二家頗自不同大統歷缺此法故詳論之律應五十五日六十刻八十九分律總旬周六十日宿周二十八日黃鐘冬至益卦初九小寒益卦六二復卦初九六二六三六四六五上六頤卦初九六二六三六四六五上九屯卦初九六二六三六四九五上六旣濟初九六二九三六四九五上六家人初九六二九三六四九五上九大呂大寒益卦六三立春益卦六四臨卦初九九二六三六四六五上六明夷初九六二九三六四六五上六賁卦初九六二九三六四六五上九損卦初九九二六三六四六五上九節卦初九九二六三六四九五上六
