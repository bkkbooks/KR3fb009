body:
  text: 不合也前人有云類其同則知其中辨其異則知其變先後相戾者不可得兼也若曲變其法以改先者則後者愈後以改後者則先者益先徒令合者皆不合矣今乃折取中數不執一偏則先後二者雖不盡合而其相去亦皆不遠凡相合者各得其中乎之率矣附録二十條自萬歷二十二年甲午起後三年丙甲歲五月夏至大統癸已六刻斯法壬辰九十八刻授時壬辰九十七刻又四年庚子歲五月夏至大統甲寅三刻斯法癸丑九十四刻授時癸丑九十四刻又四年甲辰歲五月夏至大統乙亥初刻斯法甲戌九十一刻授時甲戌九十一刻又六年庚戌歲十一月冬至大統巳酉八刻斯法戊申九十八刻
