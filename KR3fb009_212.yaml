body:
  text: 一萬歷三十八年庚戌歲依大統歷丙子日子正刻小滿該閏三月依斯法乙亥日亥正一刻小滿該閏四月萬歷四十年壬子歲依大統歷庚寅日子正初刻大寒該閏十一月依斯法巳丑日亥初三刻大寒該閏十二月皆因時差一辰遂致氣差一日而致閏差一月若庚戌歲者不獨差一月又且差一季以夏為春矣傳曰閏以正時時以作事事以厚生生民之道於是乎在可不愼歟折中厯法卷之九終
