body:
  text: 在亢二度晡時食從西北日下晡時復仝上依斯法算距嘉靖甲寅歲一千六百四十二年日食九分八十五秒初虧未初二刻西北食甚未正三刻正北復圓申正初刻東北食甚日躔黃道角十一度七十八分赤道角十度八十五分依舊法算距至元辛巳歲一千三百六十九年日食九分四十三秒初虧未正初刻西北食甚申初一刻復圓申正二刻正東食甚日躔黃道角九度八十五分赤道角九度七分謹按歷經云若當時有宿度仍依當時歷法命之依三統歷冬至日在牽牛加而命之則與亢
