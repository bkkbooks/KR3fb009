body:
  text: 折衷厯法十三卷直隸總督採進本明朱仲福撰仲福靈壽人初元郭守敬作授時厯明洪武中因其書作大統厯而去其上考下求歲實消長之法是以嘉靖中以大統授時二厯相較考古則氣差三日推今則時差九刻何瑭邢雲路鄭世子載堉諸人紛紛攻詰迄無定論仲福是書成於萬厯二十二年用萬厯九年爲厯元折衷二厯强弱之間以爲活法然大抵勉强牽就非能宻合天行且授時所定歲實其小餘爲二千四百二十五分已爲不宻以史所載考之丁丑年冬至在戊戌日夜半後八刻半又定戊戌冬至在癸卯日夜半後三十三刻已卯冬至在戊申日夜半後五十七刻庚辰冬至在癸丑日夜半後八十一刻辛已冬至在已未日夜半後六刻夫一歲小餘二十四刻二十五分積之四歲正得九十七刻無餘無欠而丁丑至辛已四年已多半刻其積算未精已槩可見仲福歩日躔術乃定日平行一度躔周爲三百六十五度二十五分仍是後漢時四分最疎之率是名爲折衷授時大統二法實較二法爲尤舛矣
