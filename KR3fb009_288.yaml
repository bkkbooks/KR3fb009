body:
  text: 初虧申正三刻昏刻東北食甚酉正一刻一更三點正北復圓戌初三刻一更五點西北食甚月離黃道柳三度四十一分赤道柳三度六十二分依舊法算距至元辛巳歲八百四十五年月食八分七十三秒初虧申正三刻昏刻正東食甚酉正二刻一更三點復圓戌正一刻二更一點正西食甚月離黃道柳二度七十九分赤道柳二度九十七分宋文帝元嘉十四年五月十五日丁夜月食盡在斗二十六度以衝計之日當在井三十同上按赤道斗旡二十六度唐志大衍歷議云古以牽牛上星為距太初改用中星然則斗二十六度者漢太初歷所測也斯法改斗二十六度為
