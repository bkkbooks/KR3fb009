body:
  text: 月未入已復二分八十秒月巳出不見復九十一秒初虧寅初四刻五更三點東北食甚卯初初刻曉刻正北復圓卯正一刻在晝西北食甚月離黃道角四度九十六分赤道角四度六十七刻又丙申歲閏八月乙丑朔日食依斯法算距嘉靖甲寅歲四十二年距萬歷辛巳歲一十五年日食九分七十五秒初虧巳正三刻西北食甚午正初刻正北復圓未初一刻東北食甚日躔黃道翼十九度赤道翼十七度六十二分依舊法算
