body:
  text: 嶽臺乃前代測景之處謂之地中故略載之以見隨處晷漏不同求每日子正午正日躔黃道去極處置所求日晨前夜半黃道積度滿躔中去之在象策巳下為初限巳上減反躔中餘為未限滿積度去之餘以其段內外差乘之百約為分用減內外度內為出入赤道內外度內減外加象策即所求日躔黃道子正去極度及分秒午正去極度放此求每日午正隨處月去地度置所求日午正日躔黃道去極度及分併其處北極出地度及分用減躔中餘即其處日去地度為弧半背若弧半背在象策巳上反減躔中餘為弧半背則知景在表南約量失數與限二十九度五分五十秒相減餘以六十一分七十七秒乘之百約為加減差失在限巳上加巳下減加減百八十七秒九十分為定差以失與五十八度十一分相減餘以定差乘之滿百度約為分不滿退除為秒併入九度為法復以矢與百一十六度二十二分相減相乘及矢自乘相併為實開方所得進一位以法
