body:
  text: 距至元辛巳歲三百一十五年日食九分七十秒初虧午初初刻正西食甚午正二刻復圓未初三刻正東食甚日躔黃道翼十八度九十分赤道翼十七度五十三分又四年戊戌歲七月戊戌夜望月食依斯數算距嘉靖甲寅歲四十四年距萬歷辛巳歲一十七年月食九分十八秒初虧丑初初刻四更一點東北食甚丑正二刻四更五點正北復圓寅正初刻五更四點西北食甚月離黃道虛六度九十六分赤道虛六度八十六分依舊法算
