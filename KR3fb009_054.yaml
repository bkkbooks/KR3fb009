body:
  text: 酉月策二百六十五日七十七刻五十三分三十七秒戌月策二百九十五日三十刻五十九分三十秒亥月策三百二十四日八十三刻六十三分二十三秒子月策三百五十四日三十六刻七十一分十六秒丑月策三百八十三日八十九刻七十七分九秒朔策二十九日五十三刻五分九十三秒望策十四日七十六刻五十二分九十六秒半弦策七日三十八刻二十六分四十八秒半閏應十九日三十六刻十九分求閏餘置歲定積減去閏應滿朔策去之不盡即所求閏餘日及分秒求泛閏視閏餘在十八日巳上者其年有閏置所求閏餘全分加九十刻六十三分部與朔策相減視餘几日為閏几月不滿日者有閏在年前子丑月又法左手亥
