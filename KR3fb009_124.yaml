body:
  text: 置定限度與初末限相減相乘退位為分為定差正交中交後為加半交後為減以差加減正交道赤道積度為月離白道定積度以前宿白道定積度減之各得月離白道宿次及分求定弦望加時月離白道宿度各以月離赤道正交宿度距所求定朔弦望加時月離赤道宿度為正交後積度滿象策去之為半交後再去之為中交後又去之為半交後視交後積度在半象巳下為初限巳上用減象策為末限以初末限與定限度相減相乘退位為分分滿百為度為定差正交中交後為加半交後為減以差加減月離赤道正交後積度為定積度以正交宿度加之以其所當月離白道宿度去之各得定朔弦望加時月離白道宿度及分秒求每日月臨午位黃道宿度置月離赤道定積度及中星所臨宿積度上弦前後視昏度望前後視夜半度下弦前後視晨度月在中星巳下為前巳上為後以月星積度相減不及則加躔周而後
