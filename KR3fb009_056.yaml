body:
  text: 位起十八日戌位十九酉位二十如是右旋視所至處亦得泛閏若至子位丑位者閏在昨歲之冬求朔積置所求月策減去閏餘即其月朔積若求閏月及閏後月者復加朔策方為其月朔積求經朔弦望置所求月朔積加黃鍾大小餘滿旬周去之各得其月經所加以望策即得經望以弦策加經朔得上弦加經望得下弦求盈虛置十六日減去氣策餘為沒限恆氣小餘在沒限巳上為有沒之氣以十五乘之用減氣策餘如氣策小餘而為一日併恆氣大餘為沒古歷謂之沒今歷謂之盈置三十日減去朔策餘為朔虛經朔小餘在朔虛巳下為有滅之朔以三十乘之如朔虛而一為日併經朔大餘為滅古歷謂之滅今歷謂之虛折中厯法卷之一終
  hash: sha256:c6f5c1a685f6c6c0326c4fc493f64f654f32a4828e6de531945a06947ddc7e75
