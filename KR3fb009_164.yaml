body:
  text: 以其星見伏度乘之十五除之所得滿行差而一爲日不滿除爲分秒見加伏減汎積爲其星定見定積伏定積日及分秒加命如前卽得定見定伏日晨金水二星各以伏見日行差除其段初日太陽盈縮積爲日不滿退除爲分秒夕見晨伏盈加縮減晨見夕伏盈減縮加加減其星定見定伏汎積日及分秒爲常積若在歲中巳下爲冬至後巳上去之爲夏至後在歲中折半巳下自相乘巳上反減歲中餘亦自相乘冬至後晨夏至後夕十八而一爲分冬至後夕夏至後晨七十五而一爲分以其星見伏度乘之十五除之所得滿行差而一爲日不滿退除爲分秒晨見夕伏冬至後加夏至後減夕見晨伏冬至後減夏至加皆加減常積爲其星定見定伏定積日及分秒加命如前卽得定見定伏日晨折中厯法卷之七終
