body:
  text: 元豐六年癸亥歲十一月丙午景長見元志太初乙卯七十五刻大衍丙午七十三刻紀元丙午二十六刻授時丙午二十六刻大統丙午二十八刻斯法丙午二十五刻右太初後天九日餘與天合元豐七年甲子歲十一月辛亥景長見元志太初辛酉空刻大衍辛亥九十七刻紀元辛亥五十刻授時辛亥五十一刻大統辛亥五十三刻斯法辛亥四十九刻右太初後天十日餘與天合元祐三年戊辰歲十一月壬申景長見元志太初壬午空刻大衍壬申九十五刻紀元壬申四十八刻授時壬申四十八刻大統壬申五十刻斯法壬申四十六刻右太初後天十日餘與天合元祐四年已已歲十一月丁丑景長見元志太初丁亥二十五刻大衍戊寅十九刻紀元丁丑七十二刻授時丁丑七十二刻
