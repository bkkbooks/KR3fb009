body:
  text: 求經朔弦望入轉置歲定積減去轉應滿轉周去之不盡卽所求入轉大小餘各加其月朔積及弦望策滿轉周去之爲所求經朔弦望入轉大小餘若徑求次朔入轉以轉差加之求疾遲初末限置入轉大小餘以十二限二十分乘之在離中巳下爲疾巳上減去離中爲遲在離象巳下爲初巳上反減離中爲末又法視入轉大小餘在轉中巳下爲疾已上減去轉中爲遲在轉象已下爲初已上返減轉中爲末以十二限二十分乘之爲疾遲初末限求疾遲差置立差三秒二十五忽以所求限大餘乘之加平差
