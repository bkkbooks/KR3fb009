body:
  text: 求經朔弦望入轉置歲定積減去轉應滿轉周去之不盡即所求入轉大小餘各加其月朔積及弦望策滿轉周去之為所求經朔弦望入轉大小餘若徑求次朔入轉以轉差加之求疾遲初末限置入轉大小餘以十二限二十分乘之在離中巳下為疾巳上減去離中為遲在離象巳下為初巳上反減離中為末又法視入轉大小餘在轉中巳下為疾已上減去轉中為遲在轉象已下為初已上返減轉中為末以十二限二十分乘之為疾遲初末限求疾遲差置立差三秒二十五忽以所求限大餘乘之加平差
  hash: sha256:da804e81456b7ef0017925539dca0d7cca921a9492a77aff6371bbe8b2f9f0b2
