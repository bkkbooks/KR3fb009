body:
  text: 某日其長違諸公乎衆驚曰先生康強何言此有術乎何決如斯仲福曰無術第卧聽吾耳至每一伏時若干則一斷過一日則少若干以厯法計之明年某月某日數盡矣至先三日遍辭鄉里親故坐一室人皆環視之談笑如常笑曰氣盡數盡矣瞑目而逝其子為覺墓人皆見仲福立墓上鄉人共稱曰孝德先生製碣於墓焉國朝太子少保工部尚書前翰林院編充國史館編修官邑人傅鱗撰
