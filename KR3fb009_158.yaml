body:
  text: 前退者置後段初日行分以其日差減之為末日行分後退者置前段末日行分以其日差減之為初日行分以本段平行分減之餘為增減差水星退行者半平行分為增減差皆以增減差加減平行分為初末日行分前多後少者加為初減為末前少後多者減為初加為末又倍增減差為總差以日率減一除之為日差求每日晨前夜半星行宿度各置其段初日行分以日差纍損益之後少則損之後多則益之為每日行度及分秒乃置其段初日晨前夜半定積度順加退減滿宿度去之即每日晨前夜半星行宿度及分秒求平合見伏入太陽盈縮歷置其星其段定積日及分秒在歲中巳下為盈巳上去之為縮多則再去之復為盈各在初限巳下為初限巳上反減歲中餘為末限即其星平合見伏入歷日及分秒求平合見伏星與太陽行差
