body:
  text: 各以其星其段初日星行分與其段初日太陽行分相減餘為行差若金水二星退行在退合者以其段初日星行分併其段初日太陽行分為行差其水星夕伏晨見者直以其段初日太陽行分為行差求定合定見定伏泛積日土木火三星各以平合晨見夕伏定積日便為定合伏見泛積日及分秒金星置其段盈縮差水星倍置之各以其段行差除之為日不滿退除為分秒在平合夕晨伏者盈減縮加在退合夕伏晨見者盈加縮減各加減定積日為定伏見泛積日及分秒求定合定積日定積度土木火三星各以平合行差除其段初日太陽盈縮積為距合差日不滿退除為分秒以太陽盈縮積減之為距合差度副置其星定合泛積以距合差日差度盈減縮加之為其星定合定積日定積度及分秒此與下條言盈縮者皆指太陽非謂本星金水二星順合退合者各以平合退金行差除其日
