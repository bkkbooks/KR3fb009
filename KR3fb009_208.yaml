body:
  text: 宋崇天此二家者在大衍後蓋寫大衍舊率而失之後天也今以統天歷授時歷考之亦與斯法所推同以此觀之古今諸歷相較斯法爲密庶幾千載之日至可坐而致云附錄三條一自萬歷二十二年甲午已後六十年中間春秋二分冬夏二至大統歷與斯法不同者凡二十四條斯法皆在大統前一日大統皆在斯法後一日夫二至二分乃歷家根本大統歷法或誤不可不辨也撮其略列於此冬至庚戌年戊申巳酉甲寅年己巳庚午戊午年庚寅辛卯癸未年辛丑壬寅丁亥年壬戌癸亥辛卯年癸未甲申夏至丙申年壬辰癸巳庚子年癸丑甲寅甲辰年甲戌乙亥乙丑年甲子乙丑己已年乙酉丙戌癸酉年丙午丁未春分丁酉年丙寅丁卯戊午年丙辰丁巳壬戌年丁丑戊寅丙寅年戊戌已亥庚午年已未庚申辛卯年已酉庚戌秋分癸卯年庚子辛丑丁禾年辛酉壬戌辛亥年壬午癸未丙子年癸已甲午庚辰年甲寅乙卯甲申年乙亥丙子
