body:
  text: 二至晷景考第十説者皆云漢歷有四太初最密唐歷有八大衍最密宋歷十六紀元最密元歷有二授時最密今大統歷與回回歷相校大統最密然斯率與之校所得尤多視太初等歷大不侔矣自魯僖公五年丙寅歲正月至洪武十六年癸亥歲十一月二千三十八年之間傳志所載二至晷影凡六十事用前代所謂密者四歷及大統歷并斯法考之所得開列於後魯僖公三年丙寅歲春王正月辛亥朔日南至見春秋左傳漢太初歷辛亥二十五刻唐大衍歷辛亥九十四刻宋紀元歷壬子八十四刻元授時歷辛亥十四刻明大統歷甲寅八十二刻斯法推得辛亥五十五刻右紀元後天一日大統後天三日餘與天合昭公二十年已卯歲春王二月已丑日南至同上太初巳丑五十刻大衍已丑四十五刻紀元庚寅二十五刻授時戊子八十三刻
