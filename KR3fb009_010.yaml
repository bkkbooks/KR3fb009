body:
  text: 冬夏二至乃厯法之綱領時刻微差已失其真况差一日乎若恒氣既乖則置閏失當盈虚没滅建除滿乎之類吉凶宜忌一切皆錯此非厯官之失正由厯經當改而未改也凡有形之物銖銖稱之至石必差寸寸量之至引必錯况無形之數乎夫乾樞幹運無停七政轉動不齊而拘以一定之法膠柱鼓瑟是以既久則不能不差既差則不可不改耳又推得萬厯二十二年後再七十六年嵗次壬子十一月冬至大統在甲戍日丑正三刻授時在甲戍日子正初刻相差十餘刻再九百年嵗次壬子十一月冬至大統在壬子日辰正三刻授時在庚戍日戌初二刻相差兩日再九千年嵗次壬子十一月冬至大統在授時之明年三月甲戌日戌正三刻授時在大統之去年八月已丑日刻初一刻相差一百餘日當此之時大統之冬至近授時之清明授時之冬至近大統之白露不獨相差一季又且相隔一年所差非不多也夫厯法苟得其理則千嵗之日至猶今日耳千載之後有差安知今日未必旡差又豈可不議及哉或以為授
