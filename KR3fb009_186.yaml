body:
  text: 五紀歷唐代宗時郭獻之等造距寶應元年壬寅歲至萬歷二十二年甲午歲八百三十二年以其法推寶應元年天正冬至得戊戌及推萬歷二十二年天正冬至得辛巳後天二日以授時歷上考寶應元年天正冬至得丁酉斯法與授時同貞元歷唐德宗時徐承嗣等造距建中五年甲子歲至萬歷二十二年甲午歲八百一十年以其法推建中五年天正冬至得癸巳及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考建中五年即是興元元年天正冬至得癸巳與貞元歷合宣明歷唐穆宗時徐昂等造距長慶二年壬寅歲至萬歷二十二年甲午歲七百七十二年以其法推長慶二年天正冬至得壬子及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考長慶二年天正冬至得壬子與宣明歷合
