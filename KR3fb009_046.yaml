body:
  text: 建午芒種五月節夏至五月中螳蜋生鵙始鳴反舌無聲鹿角解蜩始鳴半夏生建未小暑六月節大暑六月中溫風至蟋蟀居壁鷹始摯腐草為螢土潤溽暑大雨時行建申立秋七月節處暑七月中涼風至白露降寒蟬鳴鷹乃祭鳥天地始肅禾乃登建酉白露八月節秋分八月中鴻雁來玄鳥歸羣鳥養羞雷始收聲蟄蟲壞戶水始涸建戌寒露九月節霜降九月中鴻雁來賓雀入大水為蛤菊有黃華豺乃祭獸草木黃落蟄蟲咸俯建亥立冬十月節小雪十月中水始冰地始凍雉入水為蜃虹藏不見天氣上升地氣下降閉塞而成冬
