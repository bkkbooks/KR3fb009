body:
  text: 求五星平合日置歲定積各加其星合應滿其周率去之不盡反減周率餘即所求歲首冬至後平合日及分秒求諸段積日積度副置平合日及分秒纍加段日即諸段積日命為度纍加平度退則減之即諸段積度及分秒求諸段入歷置歲定積各以其星歷應併所求平合日及分秒加之如其度率一而為度不滿退除為分秒滿日躔歷率去之不盡為所求平合入歷度纍加限度各得其段入歷度及分秒求盈縮初末限置各段入歷度及分秒若在躔中巳下為盈巳上減去躔中為縮其土木金水四星諸段在象策已下為初限巳上用減躔中餘為末限其火星諸段盈者在二因辰策巳下縮者在四因辰策巳下為初限巳上用減躔中餘為末限求盈縮差
