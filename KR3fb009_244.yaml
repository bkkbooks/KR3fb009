body:
  text: 折中厯法卷之十一二至晷景考第十一宋景德四年丁禾歲十一月戊辰日南至見元志太初丙子七十五刻大衍戊辰十五刻紀元丁卯七十四刻授時丁卯八十刻大統丁卯八十五刻斯法丁卯七十九刻右太初後天八日大衍與天合餘皆先天一日元志授時歷議云自宋以來測景驗氣者凡十七事其景德丁未歲戊辰日南至統天授時皆得丁卯是先一日嘉泰癸亥歲甲戌日南至統授時皆得乙亥是後一日一失之先一失之後若曲變其率以從景德則其餘十六事多後天若從嘉泰則其餘十六事多先天以此理推之非歷不合也蓋類其同則知其辨其異則知其變巳下二條仿此皇祐元年巳丑十一月十九日戊申景長見宋志太初丁已二十五刻大衍戊申四十五刻紀元丁未七十七刻授時丁未九十九刻
