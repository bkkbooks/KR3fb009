body:
  text: 步交道第五正交三百六十三度七十九分三十四秒中交百八十一度八十九分六十七秒距交十四度六十六分十六秒交周二十七日二十一刻二十二分二十四秒交中十二日六十刻六十一分十二秒交差二日三十一刻六十三分六十九秒交應二十日四十七刻三十四分求經朔弦望入交置歲定積減去交應滿交周去之不盡卽所求入交大小餘各加其月朔積及弦望策滿交周去之爲所求經朔弦望入交大小餘若徑求次朔入交以交差加之求定朔弦望加時及每日夜入交置經朔弦望入交大小餘以定朔弦望加減差加減之爲定朔弦望加時入交以定朔弦望小餘減之爲定朔弦望晨夜半入交累加一日爲每日晨前夜半
