body:
  text: 授時巳亥九十二刻又四年庚戌歲五月夏至大統辛酉一刻斯法庚申八十八刻授時庚申八十九刻又二年壬子歲十一月冬至大統甲戌十二刻斯法癸酉九十八刻授時甲戌初刻又九百年壬子歲十一月冬至大統壬子三十七刻斯法庚戌九十刻授時庚戌八十一刻又九千一百年壬子歲十一月冬至大統甲戌八十七刻斯法壬寅十六刻授時已丑八十九刻先大統百五日先斯法十三日已上預推未來二至新舊三家各有異同宜於其時測驗晷景以證新舊歷孰為疏密也用述大概以發其端附於此卷之末自萬歷元年已來百年之間大統授時二歷相差不過十餘刻及至千年則差二日萬年則差百有餘日所差
