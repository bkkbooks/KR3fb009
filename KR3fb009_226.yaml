body:
  text: 月三日求其蚤晚令後二日景相減則一日差率也倍之為法前二日相減百刻乘之為實以法除實得冬至加時在夜半後三十一刻則在元嘉歷後一日天數之正也按元儒算晷景其法不同今附載於此是十月初十日壬戌景長一丈七寸七分五釐十一月二十五日丁亥景長一丈八寸一分七釐五毫二十六日戊申景長一丈七寸五分依元儒法當置壬戌戊申二日之景相減餘二分五釐以百刻乘之得二百五十刻為實卻以丁未戊申二日之景相減餘六分七釐五毛為法除之得三十七刻乃置壬戌戊申相距四十六日百刻乘之得四千六百刻凡冬至景前多後少為減減去三十七刻折半得二千二百八十一刻加日中五十刻為二十三日三十一刻命起前距壬戌算外得十一月初三日乙酉三十一刻即所求冬至也欲使初學易曉故詳載之唐志大衍歷議曰祖沖之既失元嘉十三年甲戌冬至以為加時太早增
