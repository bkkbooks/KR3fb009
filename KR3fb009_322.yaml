body:
  text: 月食四分四十秒初虧子正四刻三更五點東北食甚丑正一刻四更二點正北復圓寅初二刻四更五點西北食甚月離黃道昴二度六十二分赤道昴二度六十七分依舊法算距至元辛巳歲三百二十二年月食四分四十秒初虧丑初一刻四更一點東北食甚丑正三刻四更四點正北復圓寅正一刻五更一點西北食甚月離黃道昴二度五十四分赤道昴二度五十九分又一年甲辰歲四月辛巳朔日食依斯法算距嘉靖甲寅歲五十年距萬歷辛巳歲二十三年
