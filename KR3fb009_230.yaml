body:
  text: 太初壬子空刻大衍乙已八十六刻紀元乙已七十九刻授時乙巳九十刻大統丙午四十刻斯法乙巳九十五刻右太初後天七日大統後天一日餘與天合建德元年壬辰歲十一月二十九日丁卯景長同上太初癸酉空刻大衍丙寅八十三刻紀元丙寅七十七刻授時丙寅八十七刻大統丁卯三十七刻斯法丙寅九十三刻右太初後天六日大統與天合餘皆先天一日建德二年癸巳歲五月初三日戊辰景短見隋志太初乙亥六十二刻大衍已巳四十六刻紀元已巳三十九刻授時已已四十九刻大統已巳九十九刻斯法已巳五十五刻右按歷法凡冬夏二至相距一百八十二日六十二刻有奇是歲歲前天正冬至在丁卯丁卯距戊辰不足一百八十二日必旡戊辰夏至之理若就戊辰夏至則失冬至此蓋隋志之誤旡疑諸歷推已巳者為是惟太初後六日
