body:
  text: 諸歷冬至考第九應天歷宋太祖時王處訥等造距建隆三年壬戌歲至萬歷二十二年甲午歲六百三十二年以其法推建隆三年天正冬至得丙寅及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考建隆三年天正冬至得丙寅與應天厯合乾元歷宋太宗時吳昭素等造距太平興國六年辛巳歲至萬歷二十二年甲午歲六百一十三年以其法推太平興國六年天正冬至得丙午及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考太平興國六年天正冬至得丙午與乾元歷合儀天歷宋真宗時史序等造距咸平四年辛丑歲至萬歷二十二年甲午歲五百九十三年以其法推咸平四年天正冬至得辛卯及推萬歷二十二年天正冬至得辛巳後天二
