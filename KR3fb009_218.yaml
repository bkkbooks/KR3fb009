body:
  text: 辛酉歆乃以為甲子差天三日尚不能知而能逆知上下數百載乎然則獻公十五年冬至當在何日曰三統授時之甲寅失之先紀元大定之丁已失之後大衍所推丙辰宣明所推乙卯庶或近之然則無所考據闕其疑可也以要言之凡春秋前後千載之間氣朔交食長歷大衍所推近是劉歆班固所説全非杜預一行巳有定論詳載別卷也劉宋元嘉十二年乙亥歲十一月十五日戊辰景長見隋志太初癸酉七十五刻大衍戊辰三十五刻紀元戊辰三十九刻授時戊辰四十七刻大統巳巳十四刻斯法戊辰五十二刻右太初後天五日大統後天一日餘與天合元嘉十三年丙子歲十一月二十六日甲戌景長見隋志太初己卯空刻大衍癸酉五十九刻紀元癸酉六十三刻授時癸酉七十一刻
