body:
  text: 年天正冬至得已巳及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考大定二十年天正冬至得已巳與大明歷合會元歷宋光宗時劉孝榮重造距紹熙二年辛亥歲至萬歷二十二年甲午歲四百三年以其法推紹熙二年天正冬至得丁卯及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考紹熙二年天正冬至得丁卯與會元歷合統天歷宋寧宗時楊忠輔造距慶元五年已未歲至萬歷二十二年甲午歲三百九十五年以其法推慶元五年天正冬至得巳酉日十六刻及萬歷二十二年天正冬至得已卯日七十八刻先斯法八刻以斯法上考慶元五年天正冬至得巳酉日十六刻與統天歷合開禧歷宋寧宗時鮑浣之造距開禧三年丁卯歲至萬歷二十二年甲午歲三百八十七年以其法推開禧三年天正冬至得辛
