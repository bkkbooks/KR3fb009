body:
  text: 太初已丑十二刻大衍壬午八十八刻紀元壬午八十刻授時壬午九十六刻大統癸未三十八刻斯法壬午九十六刻右太初後天六日大統與天合餘皆先天一日是年十一月十四日乙酉景長見隋志太初辛卯七十五刻大衍乙酉五十刻紀元乙酉四十二刻授時乙酉五十九刻大統丙戌初刻斯法乙酉五十八刻右太初後天六日大統後天一日餘與天合開皇十一年辛亥歲十一月二十八日丙午景長仝上太初壬子七十五刻太衍丙午四十八刻紀元丙午四十刻授時丙午五十六刻大統丙午九十七刻斯法丙午五十六刻右太初後天六日餘與天合開皇十四年甲寅歲十一月辛酉朔旦景長隋志太初戊辰五十刻大衍壬戌二十一刻紀元壬戌十三刻授時壬戌二十九刻大統壬戌七十刻斯法壬戌二十九刻
