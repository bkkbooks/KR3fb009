body:
  text: 小餘以附會之而十二年戊辰景長得已已十士七年甲午景長得乙未十八年已亥景長得庚子合一失三其失愈多劉孝榮張胃元因之小餘益強又以十六年已丑景長爲庚寅矣治歷者紏合衆同以稽其所異苟獨異焉則失行可知今曲就其一而少失三多者五是舍常數而從失行也夫以唐志此説證之則沖之所測景蓋假託而非直雖其等數有可取焉按之其説則是景則非也一行譏謂元之謬所謂孰一失五者卽以上六條而元統所造大統歷其失乃與沖之胃元相類推今雖密考古頗疏李德芳輩蓋不無遺憾云周天和二年丁亥歲十一月初三日庚子景長隋志太初丙午七十五刻大衍庚子六十一刻紀元庚子五十五刻授時庚子六十五刻大統辛丑十五刻斯法庚子七十一刻右太初後天六日大統後天一日餘與天合天和三年戊子歲十一月十四日乙巳景長見隋志
