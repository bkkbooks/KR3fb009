body:
  text: 是年十一月癸丑日戌正二刻冬至見元志太初甲子七十五刻大衍甲寅六十三刻紀元甲寅一刻授時癸丑八十一刻大統癸丑八十一刻斯法癸丑八十一刻右太初後天十一日大衍紀元後天一日餘與天合至元十七年庚辰歲十一月已未日丑初一刻冬至見元志太初庚午空刻大衍已未八十七刻紀元已未二十五刻授時巳未六刻大統巳未六刻斯法已未六刻右太初後天十一日餘與天合本朝洪武十六年癸亥歲十一月巳未日冬至見大學衍義補太初庚午七十五刻大衍庚申五刻紀元已未三十四刻授時巳未二刻大統已未三刻斯法已未二刻右太初後天十一日大衍後天一日餘與天合
