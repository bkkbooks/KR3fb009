body:
  text: 右二分辨之稍粗惟二至憑晷景以驗之則真僞最易辨而歷法疏密可決矣一凡歷法之疏密當以天為驗證是乃歷之本也何謂天之驗證自古以來景長之極為真冬至長之不極雖名冬至實非真冬至也景短之極為真夏至短之不極雖名夏至實非真夏至也且如萬歷二十四年五月夏至大統歷推得癸已而斯法推得壬辰此夏至之不相同也萬歷三十八年十一月冬至大統歷推得已酉而斯法推得戊申此四日無題勒款識孰知其真否可與衆共辨者惟晷影是證耳若萬歷二十四年夏至之日其景不短而前一日之景卻短萬歷三十八年冬至之日其景不長而前一日之景郤長則知斯法為密大統為疏亦昭然矣後漢志曰歷不差不改不驗不用未差旡以知其失未驗旡以知其是失然後改是然後用此前人定論也餘條冬夏至悉皆仿此云
