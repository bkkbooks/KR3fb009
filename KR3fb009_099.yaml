body:
  text: 除之為弧半背即其處日去地度及分秒如不同更增損矢數算之以同為矢定數求每日隨處中晷泛數置五十八度十一分減去所求矢定數餘用八因為實復以矢與百一十六度二十二分相減相乘平方開之為法除實命度為尺即其日其處中晷泛數求每日隨處中晷定數各與其處立八尺表每日實測午晷真數而與算術所求晷數相餘名為地形差所測晷數多則為加少則為減加減所算晷數即其日其處中晷定數求二至加時真數取二至前後晷數近似者相減餘以百刻乘之為實取其次日晷數相減餘為法實如法而一為刻求冬至視其前晷多則為減差少則為加差夏至反之總計距日刻數以差加減折半加五十刻為前距定日以其日算外命之即二至加時真數求每日半晝夜及日出入晨昏分置所求初未限滿積度去之餘以其段晝夜差乘之
