body:
  text: 右太初後天十一日大衍後天一日餘與天合史官所記二至晷景凡六十條以太初等五歷及斯法考之太初合者僅二後天五日至十一日者凡五十八大衍合者三十六先一日者六後一日者十七後二日者一紀元合者四十二先一日者十後一日者八授時合者四十八先一日者十後一日者二大統合者四十二先一日者三後一日者十三後三日者二斯法合者比授時多一事其不合者比授時少一事夫以此觀之則太初最密固旡足取大衍紀元非見用者亦不必論其授時歷不合者十二而先者多至於十後者僅二蓋減分太多未得其宜也將來氣朔皆失之先矣大統歷不合者十八而先一日者僅三後一日者多至十三後三日者二蓋由歲餘一定而旡加減故也夫後者多而先者少今雖未覺其失恐將來氣朔浸失之後矣斯法不合者十一比授時為少合者四十九視授時為多蓋密於授時矣其不與天合者非
