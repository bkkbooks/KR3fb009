body:
  text: 大統庚子六十刻斯法巳亥九十八刻右太初後天六日大統後天一日餘與天合元嘉十九年壬午歲十一月初三日已巳景長見隋志太初庚戌五十刻大衍乙巳六刻紀元乙已十刻授時乙巳十七刻大統乙巳八十四刻斯法乙巳二十三刻右太初後天五日餘與天合大明五年辛丑歲十一月初三日乙酉冬至前宋志太初庚寅二十五刻大衍甲申七十刻紀元甲申七十三刻授時甲申七十九刻大統乙酉四十五刻斯法甲申八十六刻右太初後天五日大統與天合餘皆先天一日宋書元嘉歷推是年冬至在甲申日八十刻祖沖之以爲歷誤乃上議曰臣測景歷紀躬辨分寸銅表堅剛暴潤不動光晷明滅纖毫燼然據大明五年十月十日景一丈七寸七分半十一月二十五日一丈八寸一分大二十六日一丈七寸五分強折取其中則中天冬至應在十一
