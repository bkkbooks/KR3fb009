body:
  text: 百約爲分前多後少爲減前少後多爲加加減其段半晝夜分爲所求半晝夜分以半夜分便爲日出分用減百刻餘爲日入分於日出分減二刻半餘爲晨分於日入分加二刻半則爲昏分求晝夜刻及日出入時刻置所求半夜分倍之百約爲夜刻用減百刻餘爲晝刻以日出入分依時刻法求之卽得所求時刻求更點所在時刻置其日晨分倍之五約爲更率又五約爲點率各以其率乘所求更點數用加其日昏分內減更點率滿百刻去之不滿依時刻法之卽得所求時刻求昏後夜半中星置躔中度及分以其次日晨前夜半赤道日度及分秒加而命之卽所求日昏後夜半中星積度及分秒求逐日昏曉中星置其次日晨分以躔周加一度乘之萬約爲度昏減曉加所求日昏後夜半中星積度卽昏曉中星積度及分秒
