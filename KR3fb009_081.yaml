body:
  text: 日行度率為每日行定度纍加四正晨前夜半日度滿黃道宿度去之為每日晨前夜半黃道日度及分秒求子午每日二正黃道日度置所求月經朔入歷以經朔小餘減之餘為經朔晨前子正入歷纍加一月為每日晨前子正入歷又以正十刻加之為午正入歷命日為度各視其限求盈縮差盈加時縮減之為所求黃道定積度以歲前冬至加時黃道日度加而命之滿黃道宿度去之即每日子午黃道日度及分秒或以其日行定度折半加晨前夜半黃道定積度亦得午中黃道定積度求每日子午二正赤道日度視黃道定積度在象策巳下為至後巳上去之為分後再去之為至後復去之為分後內減黃道積度以赤道率乘之如黃道率而一所得以加赤道積度及所去象策以歲前加時赤道日度加而命之滿赤道宿度去之即每日子午赤道日度及分秒赤道黃道十二次宿度
