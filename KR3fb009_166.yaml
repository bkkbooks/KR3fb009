body:
  text: 諸歷冬至考第八治歷者以其新法與古人課疏密於千百世之上下則往往新法與能上合於古舊法不能下合今布算考之愈前愈疏最後最密以理論之非前人拙後人工也蓋前賢草創之初無所躔襲其法出於自心其用力之勤百倍於後人後人因前賢已有之法枕玩既久開發益明積習考驗轉為精密略加潤色則青於藍而寒於水其用力少而成功多是故後學之人當感前賢之德補其所未盡則可以為莫已若則誣矣歷代諸歷可考者五十家今列敘其名目併所造之人所距之年各以其術推當時及近歲之冬至復將新率上考與相參校則疏密異同從可知已太初歷漢武帝鄧平等造三統歷漢平帝劉歆重造二歷並以太初元年丁丑歲為距至萬歷二十二年甲午歲千六百九十七年以其法推太初元年天正冬至得甲子及推萬歷二十二年天正冬至
  hash: sha256:34de3962a605a8103e270437a37a72cee8195d8d07d10bf4ee2144903b762bfd
