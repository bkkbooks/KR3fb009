body:
  text: 變矣元志云黃道宿度據歲差每移一度依術推變嘉靖初樂頀掌監事上言歷經即歲差以推變黃道六十七年該推變一次本監失於推變頀又嘗人云往年在監未奉更正甚為遺憾頀有文集可考萬歷甲午歲差所推黃道危十六度十三分昴十度九十五分元授時歷危十五度九十五分昴十一度八分近來七政四餘躔度危止於十五度昴尚有十一度乃同舊歷蓋未嘗推變頀言信矣按赤道六十七年差一度黃道七十二年差一度頀所謂六十七年該推變者誤也當云七十二年推變可也今推萬歷甲午巳來七十二年是為巳用復推未來七十二年備考云爾求冬至加時黃道日度置所求歲前冬至加時赤道日度及分秒以其赤道積度減之餘以黃道率乘之加赤道率而一所得以加黃道積度即所求歲前冬至加時黃道日度及分秒求四時正加時黃道日度
