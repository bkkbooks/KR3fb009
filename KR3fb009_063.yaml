body:
  text: 列宿相距度數歷代所測不同非微有動移則前人所測或有未密漢唐宋用窺管止存大略元人始用二線遂及分焉今歷因之用為常數校天為密若考往古仍依當時宿度命之其時無宿度者一準前人宿度故並載之以備考古所須惟推密率日躔無論古今並依今歷有分赤道宿度為準求冬至加時赤道日度置歲定積命日為度餘為度下分秒減去周應滿歷率赤道歲差折中加躔周為歷率去之不盡即所求日躔赤道
