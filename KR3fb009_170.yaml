body:
  text: 時之意以就劉歆之失今考麟德元年冬至唐歴皆以甲子而周歷漢歷皆以庚午然則自太初下至麟德差四日自太初上及僖公差三日不足疑也四分曆漢章帝時編訢等造靈帝時重修距熹平三年甲寅歲至萬曆二十二年甲午歲千四百二十年以其法推熹平三年天正冬至得丁丑及推萬曆二十二年天正冬至得壬辰後天十三日劉宋祖沖之以大明曆上考熹平三年天正冬至當在乙亥謂四分曆所推非是唐一行以大衍曆上考得甲戌今以斯法上考亦得甲戌與大衍同宋志祖沖之議曰後漢書説四分曆法雖分章設蔀創自元和而晷儀衆數定於熹平三年四分曆立冬中景長一丈立春中景九尺六寸尋冬至南極日晷最長二氣去至日數旣同則中景應等而前長後短頓差四寸此曆置冬至後天之驗也二氣中景日差九分半弱進退均調
