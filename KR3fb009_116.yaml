body:
  text: 至後滿象策去之為分後猶多再去之為至後復多仍去之為分後以其黃道積度減之餘以赤道率乘之如黃道率而一所得以加赤道積度及所去象策各為赤道定積度以歲首冬至加時赤道日度加而命之滿赤道宿度去之即每日夜半晨昏赤道月度及分秒折中厯法卷之四終
