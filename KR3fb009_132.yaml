body:
  text: 秒中前名減中後名加命為時差以併中前或中後分為距午分求食甚入盈縮定度日食置定朔加時黃道日行定積度以時差加減之為食甚入盈縮定度月食不用時差直以定望加時黃道日行定積度便為食甚入盈縮定度滿躔中去之求日食南北差視食甚入盈縮定度在象策巳下為初限已上用減躔中餘為末限以初末限自相乘千八百七十除之為度不滿退限為分秒用減四度四十六分餘為南北泛差距午分乘之半晝分除之所得用減泛差不及減減之為南北定差在縮初盈末正交加中交減在盈初縮末正交減中交加係反減者應加卻減之應減卻加之求日食東西差置食甚入盈縮定度與躔中相減相乘千八百七十除之為度不滿除之為分秒為東西泛差距午分乘之二十五刻除之為東西定差若在泛差巳上則倍泛差相減餘為定差在縮中前盈中後正交加中交減在盈中前縮中後
