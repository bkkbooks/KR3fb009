body:
  text: 大統甲戌三十九刻斯法癸酉七十六刻右太初後天五日大統與天合餘皆先天一日唐志大衍歷議曰較前代史官注記惟元嘉十三年十一月甲戌景長皇極麟德開元歷皆得癸酉蓋日度變常也元授時歷所議亦同今按前人考古景長之驗或不相合則云日度失行竊謂此言過矣苟日度失行當如歲差漸漸而移今歲既已不合來歲豈能復合邪蓋係前人所測或未密耳非日度變行也夫冬至之景一丈有餘表高晷長則景虛而淡欲就虛景之中考其真實或設望筒或置副表景符之類以求實景然望筒或一低昂副表景符或一前卻兼以測景之人工拙不同用意詳略亦異所據之表或稍有傾敧圭面或稍有斜側二至前後數日之景進退只在毫釐之間僾俙之際要亦難辨若夫陽城嶽臺略分南北尚有不同況於四海九服之遠相去千有餘里委託之人未知當否既非目擊其實所報晷景寧足信乎
