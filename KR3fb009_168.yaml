body:
  text: 得癸已後天十四日唐一行以麟德開元二歷上考上太初元年天正冬至當在辛酉謂太初所測非是今以斯法上考亦得辛酉與大衍所説同唐志大衍歷議曰太初元年三統歷及周歷皆以十一月夜半合朔冬至日月俱起牽牛一度古歷與近代密率相較二百年氣差一日三百年朔差一日推而上之久益先天引而下之久益後天太初元年周歷以甲子夜半合朔冬至麟德歷以辛酉禺中冬至十二月癸亥晡時合朔氣差三十二辰朔差四辰比疏密之大較也僖公五年周歷漢歷唐歷皆以辛亥南至後五百五十餘歲至太初元年周歷漢歷皆得甲子夜半冬至唐歷皆以辛酉則漢歷後天三日矣祖沖之張胃元促上章歲至太初元年沖之以癸亥雞鳴冬至而胃元以癸日出欲令合於甲子而適與魯歷相會自此僖公五年魯歷以庚戌冬至而二家皆以甲寅且僖公登觀臺以望而書雲物出於表晷天驗非時億度乖邱明正
