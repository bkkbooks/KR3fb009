body:
  text: 步交食第六日食交外限六度定法六十一日食交內限八度定法八十一月食限十三度五分定法八十七求交食凡例凡日食必在朔月食必在望餘日雖交不食視朔望凡交大小餘近交周上下與交周相減餘為距正交分近交中上下與交中相減餘為距中交分倍之不滿交差為入食限定朔加時在夜定望加時在晝若無帶食則不必推出入帶食則須推之凡定望加時在日出後而月食初虧於日出前者則退一日只以昨夜言望注歷時宜預推當退望而不退是為錯誤求日食時差及距午分視定朔小餘在五十刻巳下用減五十刻餘為中前分巳上減去五十刻餘為中後分以中前後分與五十刻相減相乘如九十六而一為刻下滿退除為分
