body:
  text: 道者耶人咸服其言子二力耕以養仲福之母庭前手植一柏仲福終身不忍折一枝每早起即掃柏子及落葉跪焚之教其子孫必於樹下鄉里化之無爭鬪者曰恐朱老知也恭謹端方雖疾風暴雨無改步自鄉至邑八里步履安詳士大夫每使尾之未嘗見有惰容嘗與諸士大夫遊許由山其山觀唐宋碑甚多衆誦碑文一過數年後悔未録一佳麗駢文以問仲福仲福一一誦無一字遺人始驚以為神出言簡而理甚透有一倜儻士遇其前適一車至仲福曰君知車之所以重而行遠乎其人因放論數千百言仲福曰不然彼體方而用圓是以如此其人嘆服與人談大略如此尤精厯法時朝廷間多有人言大統厯法差以問仲福仲福曰天體動厯法原活久則必差差則改今久而不改是以差人勸之著厯法書仲福曰厯法律無禁是以自古及今皆各抒所見但淺學不能窮微恐下筆有訛處欺已欺人所關不小第綜録往昔摘其當去其謬耳久之出一編曰折中厯法其論甚詳今藏其家一日忽語羣公曰明年某月
