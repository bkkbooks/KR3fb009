body:
  text: 與大衍同天和歷周武帝時甄鸞造距天和元年丙戌歲至萬歷二十二年甲午歲千二十八年以其法推天和元年天正冬至得已丑及推萬歷二十二年天正冬至得庚辰後天一日以大衍歷上考天和元年天正冬至得庚寅斯法與大衍同大象歷周靜帝時馬顯等造距大象元年已亥歲至萬歷二十二年甲午歲千千十五年以其法推大象元年天正冬至得戊戌及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考大象元年天正冬至得戊戌與大象歷合開皇歷隋文帝時張賓等造距開皇四年甲辰歲至萬歷二十二年甲午歲千一十年以其法推開皇四年天正冬至得甲子及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考開皇四年天正冬至得甲子與開皇歷合
