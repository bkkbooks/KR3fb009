body:
  text: 後巳上去之為夏至後在象策巳下為初限巳上反減躔中餘為末限求泛差距差定限度置初末限度以距交乘之如象策而一為泛差反減距交餘為距差以二十四乘泛差如距交而一所得交冬冬至後減夏至後加皆加減九十八度為定限度及分秒求月離赤道正交宿度冬至後初限加末限減視春正夏至後初限減末限加視秋正以距差加減春秋二正赤道宿度為月離赤道正交宿度及分秒求正交後赤道宿積度入初末限各置春秋二正赤道所當宿全度及分以月離赤道正交宿度及分秒減之餘為正交後積度以赤道宿度纍加之滿象策去之為半交後再去之為中交後又去之為半交後視各交積度在半象巳下為初限巳上反減象策餘為末限求每交月離白道積度及宿次
