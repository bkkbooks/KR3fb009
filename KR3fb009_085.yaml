body:
  text: 鶉火之次初起柳三度九十二分三度九十三分鶉尾之次初起張十五度四十四分十五度四十八分壽星之次初起軫十度六分十度六分大文之次初起氐一度十三分一度十三分析木之次初起尾二度九十八分二度九十七分星紀之次初起井三度七十八分三度七十八分玄枵之次初起女二度九分二度九分巳上見用巳上未來赤道有常黃道無定凡推辰次當以赤道為準隨日度歲差推變黃道右據萬歷甲午年歲差所推巳後臨時推變推變十二次宿度置赤道入次宿度及分秒以前宿赤道距後積度加之滿象策去之為四正後赤道入次積度以其赤道積度減之餘以黃道率乘之如赤道率而一所得以加黃道積度為四正後黃道入次積度以前宿黃道距後積度減之如不及加減象策以減之餘即所求黃道入赤道十二次宿度及分秒
