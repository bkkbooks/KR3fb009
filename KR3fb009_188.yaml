body:
  text: 崇玄歷唐昭宗時邊岡等造距景福元年壬子歲至萬歷二十二年甲午歲七百二年以其法推景福元年天正冬至得巳未及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考景福元年天正冬至得巳未與崇玄歷合欽天歷後周世宗時王朴造距顯德三年丙辰歲至萬歷二十二年甲午歲六百三十八年以其法推顯德三年天正冬至得乙未及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考顯德三年天正冬至得乙未與欽天歷合折中厯法卷之八終
