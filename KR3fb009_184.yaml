body:
  text: 麟德歷唐高宗時李淳風造距麟德元年甲子歲至萬歷二十二年甲子歲九百三十年以其法推麟德元年天正冬至得甲子及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考麟德元年天正冬至得甲子與麟德歷合神龍歷唐中宗時南宮說造距神龍元年乙已歲至萬歷二十二年甲午歲八百八十九年以其法推神龍元年天正冬至得巳亥及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考神龍元年天正冬至得巳亥與神龍歷合大衍歷唐玄宗時僧一行等造距開元十二年甲子歲至萬歷二十二年甲午歲八百七十年以其法推開元十二年天正冬至得戊寅及推萬歷二十二年天正冬至得辛巳後天二日以斯法上考開元十二年天正冬至得戊寅與大衍歷合
