body:
  text: 二度合漢明帝永平四年八月丙申時加未日有食之見後漢五行志注按此不言朔者八月之晦也時加未者猶言加時在未依斯法算距嘉靖甲寅歲一千四百九十三年距萬歷辛巳歲一千五百二十年日食二分七十一秒初虧未初二刻西北食甚未正二刻正北復圓申初二刻東北食甚日躔黃道元初度十二分赤道亢初度十一分依舊法算距至元辛已歲一千二百二十年日食三分五十六秒初虧未正二刻西北食甚申初三刻正北
