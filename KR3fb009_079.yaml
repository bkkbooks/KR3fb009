body:
  text: 置所求歲定積與次年歲定積相減餘命日爲度及分秒以赤道歲差折半加之以黃道歲差減之名定率四約之爲四正定象度置所求歲前冬至加時黃道日度及分秒以四正定象度累加之滿黃道宿度去之各得四正定氣加時黃道日度及分秒求四正晨前夜半黃道日度冬夏二至盈縮之端以恒爲定春秋二分置恒氣日及分秒以盈縮差命度爲日盈減縮加之卽四正定氣日及分秒置日平行度萬通之以盈縮分盈初縮末加之縮初盈末減之其爲日行定度置四正小餘以其日行定度乘之加平行度而一所得以減四正加時黃道日度各得四定晨前夜半黃道日度及分秒求每日晨前夜半黃道日度以四正定氣日距後正定氣日爲相距日以四正晨前夜半日度距後正晨前夜半日度爲相距度累積相距日之行定度與相距度相減餘如相距日而一爲日差相距度多爲加相距度少爲減加減四正每
