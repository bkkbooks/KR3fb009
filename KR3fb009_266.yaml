body:
  text: 授時戊申九十八刻又四年甲寅歲十一月冬至大統庚午五刻斯法已已九十五刻授時已巳九十五刻又四年戊午歲十一月冬至大統辛卯二刻斯法庚寅九十二刻授時庚寅九十二刻又七年乙丑歲五月夏至大統乙丑十刻斯法甲子九十九刻授時甲子九十九刻又四年已巳歲五月夏至大統丙戌七刻斯法乙酉九十六刻授時乙酉九十六刻又四年癸酉歲五月夏至大統丁未四刻斯法丙午九十三刻授時丙午九十三刻又四年丁丑歲五月夏至大統戊辰一刻斯法丁卯八十九刻
