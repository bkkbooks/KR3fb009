body:
  text: 宿次劉宗何承天以嵗差及中星考之應在須女十度左右唐一行大衍厯議曰劉炫推堯時日在虛危間則夏至火已過中虞推堯時日在斗牛間則冬至昴尚未中蓋堯時日在女虛則春分昏張一度中秋分虛九度中冬至胃二度中昴距星直午正之東十二度夏至尾十一度中心後星直午正之西十二度四序進退不逾午正間軌漏使然也元人厯議亦云堯時冬至日在女虛之交而授時厯考之乃在牛宿二度是與虞剷同大統厯考之乃在危宿一度是與劉炫同相差二十六度皆不與堯典合以法上考堯元年甲辰嵗夏至午中日在柳宿十二度左右冬至午中日在女宿十度左右心昴昏中各去午正不逾半次與承天一行二家之說合矣春秋左傳昭公二十年已丑日南至授時厯推之得戊子先左傳一日大統厯推之得壬辰後左傳三日斯法推之與左傳合授時厯以至元十八年為元大統厯以洪武十七年為元斯法則以萬厯九年為元愚但恨未見大統厯全經而與之較疏密耳然天道玄遠非愚所盡
