body:
  text: 時減分太峻失之先天大統不減失之後天或曰授時近密大統為疎或授時未必全是二厯强弱之間宜有所授衷馬今四海之廣兆民之衆如許衡王恂郭守敬輩未嘗無也是在上之求之耳洪武間監正元統造大統厯以洪武甲子嵗為厯元上考下推無消長之法時監副李德芳上疏駇之謂統君子元厯不與經史相合宜用許衡辛已元厯及消長之法方合天道上曰二統皆難憑只驗七政交會行度無差者為是後監中造厯止用甲子元厯推算夫大統厯驗今交食雖密但考古之法未備德芳言之當矣愚嘗有志和合二家酌取其中立為新率不敢擅議考諸前代有奉公修治者若司馬遷之太初厯許衡耶律楚材之庚午元厯是也而私著者往往而是不必定有修治之權之位也洪武時元厯未久氣朔未差故仍舊貫不必改作但討論潤色而已今則積年既久氣朔漸差似應修治後漢志所謂三百年斗厯改憲者宜在此時矣於是採衆説之所長不依傍古人自岀手眼輯為一書其大者如堯時冬至日躔所在
