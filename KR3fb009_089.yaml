body:
  text: 步晷漏第三京師北極出地四十度太冬至中晷恆數丈五尺九寸六分夏至中晷恆數二尺三寸四分冬至晝夏至夜三十八刻夏至晝冬至夜六十二刻巳上見元志嶽臺北極出地三十五度冬至中晷恆數丈二尺八寸三分夏至中晷恆數尺五寸七分冬至晝夏至夜四十刻夏至晝冬至夜六十刻巳上見宋志黃道出入赤道內外度及半晝夜分積度內外度內外差冬晝夏夜夏晝冬夜晝夜差
