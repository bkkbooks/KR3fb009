body:
  text: 吾靈以布衣而俎豆鄉賢者有二人焉元則董靈山明則孝德先生也均隱逸自髙然靈山不仕其子掇髙科厯顯宦表掦先德易也先生則田間終老二子亦服先疇俗馨香於泮宮之側難矣乃碩德懿行里閈欽奉無間言則固與靈山相伯仲其崇祀也亦宜攷先生幼通厯數無所師承殆天畀絕世之資以折中千古之羣厯遺我後人先生之學固不止於此而於此亦足窺博大精湛之藴矣予小子固陋不敢妄議然讀此書攷據之詳即魯齋所造厯何多讓焉且間能補其缺畧然先生隱君子也豈以術學鳴哉厯詢生平别無著作其或載籍極博不少概見抑吉光片羽略示端倪固如是耶惟厯數乃厯朝所慎重古今碩儒所講究天時人事所交頼先生獨能於上下千古分至躔度推核不差毫釐其書顧不重歟康熙乙丑丙寅間邑侯陸公踵修縣志深以不見此書為憾同治戊辰予自馬紹文家得之驚喜欲狂猶幸完璧南皮張瓞生捧讀卒業嘆無路徑達之當途扼腕者再己巳春子悉經世大丈久讀散佚恭繕一帙以
