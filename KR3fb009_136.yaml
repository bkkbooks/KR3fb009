body:
  text: 置定朔望加時入轉大小餘依月離求所入疾遲限下行度減去八百二十分餘爲定限行度求定用分日食置二十分月食置三十分與所食分秒相減相乘平方所得日以七因月以六因各進二位皆以八百二十乘之如定限行度而一爲定用分求三限時刻日食置定朔小餘以時差加減之爲食甚分月食不用時差但以定望全分爲食甚分各以定用分減食甚爲初虧加食甚爲復圓依時刻法求之卽三限時刻求五限時刻月食十分已上者減去十分餘爲旣內復與十分相減相乘如是用分求之爲旣內分以減食旣以加食甚分爲食旣以加食甚分爲生光餘同前法共所求三限爲正限求月食更點置其日晨分倍之五約爲更法又五約爲點法乃置
