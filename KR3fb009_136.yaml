body:
  text: 置定朔望加時入轉大小餘依月離求所入疾遲限下行度減去八百二十分餘為定限行度求定用分日食置二十分月食置三十分與所食分秒相減相乘平方所得日以七因月以六因各進二位皆以八百二十乘之如定限行度而一為定用分求三限時刻日食置定朔小餘以時差加減之為食甚分月食不用時差但以定望全分為食甚分各以定用分減食甚為初虧加食甚為復圓依時刻法求之即三限時刻求五限時刻月食十分已上者減去十分餘為既內復與十分相減相乘如是用分求之為既內分以減食既以加食甚分為食既以加食甚分為生光餘同前法共所求三限為正限求月食更點置其日晨分倍之五約為更法又五約為點法乃置
