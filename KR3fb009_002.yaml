body:
  text: 夫厯者聖人法天垂象繫順五行紀綱萬物以前民用而詔方來者也故伏羲仰觀俯察因厯作易炎帝分八節以始農功軒轅迎日推策旁羅日月星辰乃命容成綜六術考氣象建五行察發歛起消息正閏餘謂之調厯少昊則鳳鳥司厯顓頑則南正司天帝嚳序三辰厯日月而迎送之堯欽曆象敬授人時鳥火虚昴以殷四仲舜在璣衡以齊七政協時月正日同律度量衡禹行夏正為百王不易之法湯武革命改統易朔治厯明時自古聖王莫不皆以厯事為盛舉至仲尼丘明雖在匹夫下位每於朔閏發文矯正得失宣明厯數考左傳仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也孟軻氏曰天之髙也星辰之遠也苟求其故千嵗之日至可坐而致也是以古者天子有日官諸侯有日御履端立極必體其元布政考績必因其嵗禮動樂舉必正其朔三農百工必依其時五刑九伐必順其氣庶務百為必從其期故五紀有常度庶徴有常應正朔行之天下蓋帝王
