body:
  text: 以斯法上考治平元年天正冬至得辛酉與明天歷合奉元歷宋神宗時沈括等造距熙寧七年甲寅歲至萬歷二十二年甲午歲五百二十年以其法推熙寧七年天正冬至得癸丑及推萬歷二十二年天正冬至得庚辰天一日以斯法上考熙寧七年天正冬至得癸丑與奉元歷合觀天歷宋哲宗時皇君卿造距元祐七年壬申歲至萬歷二十二年甲午歲五百二年以其法推元祐七年天正冬至得戌子及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考元祐七年天正冬至得戌子與觀天歷合占天歷宋徽宗時姚舜輔造距崇寧二年癸未歲至萬歷二十二年甲午歲四百九十一年以其法推崇寧二年天正冬至得乙酉及推萬歷二十二年天正冬至得庚辰後天一
