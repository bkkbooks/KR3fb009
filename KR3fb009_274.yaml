body:
  text: 古今交食考第十二前法課歷故事取各家所造之歷各使推而上之於千百世之上以求交食與夫歲月日星辰之著見於經史者為合與否然後推而下之以定當來之氣朔則知與往古相合者為密不合者為疏甚易辨也萬歷九年辛巳歲距漢武帝元光元年丁禾歲一千七百一十四年距陳宣帝大健八年丙申歲一千有五年二者之間史志原載日月食分加時起復方位各取數事而以元儒舊法并今法考之自唐已下不必考者未及千年故略之也仍取萬歷甲午已後日月交食亦各數事較其同異載之此卷往則稽於史來則驗於天而新舊之疏密可見矣漢武帝元光元年七月癸未先晦一日日有食之在翼八度劉向云日中時食從東北過半晡時復見前漢書五行志謹按日食必起自西理無從東起者疑有脫文故也當作從西北向東北食過半過半謂六七分巳
