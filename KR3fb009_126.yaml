body:
  text: 減之餘以其日轉定度乘之如躔周而一所得前減後加其日夜半晨昏月離黃道定積度以歲首冬至加時黃道日度加而命之滿黃宿度去之卽月臨午位黃道宿度及分秒求每日月臨午位赤道宿度置月臨午位黃道積度及分秒依前篇求赤道積度以歲首冬至加時赤道日度加而命之滿赤道宿度去之卽月臨午位赤道宿度及分秒求每日月臨午位時刻更點置月臨午位赤道積度及分秒以其日夜半晨前中星積度及分秒減之不及則加躔周而後減之餘以百乘之加躔周而一爲刻不滿退除爲分秒下弦已後上弦已前月中在晝依時刻法求之上弦巳後下弦巳前月中在夜依更點法求之求每日月離赤道交後初末限置月離赤道正交後積度以赤道宿度及分累加之至所求月臨午位赤道宿度及分秒在躔中巳下爲正交後巳上去之爲中交後在象策巳下爲刻限巳
