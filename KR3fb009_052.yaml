body:
  text: 策三之以減四季中氣各得其季土始用事日求列宿當支置歲定積併律策氣策以宿周折半加之律應減之滿宿周去之不盡即所求立春日當支宿命起角宿算外纍加半律外滿宿周去之各得次氣當直宿求時刻置日下小餘以十二乘之刻滿百為時命子正算外若滿五十刻亦進作一時命作子初算外算外餘如十二而一為刻不滿為初刻步所閏第二寅月策五十九日六刻十一分八十六秒卯月策八十八日五十九刻十七分七十九秒辰月策百一十八日十二刻二十三分七十二秒巳月策百四十七日六十五刻二十九分六十五秒午月策百七十七日十八刻三十五分五十八秒未月策二百六日七十一刻四十一分五十一秒申月策二百三十六日二十四刻四十七分四十四秒
