body:
  text: 皇極歷隋文帝時劉焯造距仁壽四年甲子歲至萬歷二十二年甲午歲九百九十年以其法推仁壽四年天正冬至得已酉及推萬歷二十二年天正冬至得辛已後天二日以斯法上考仁壽四年天正冬至得已酉與皇極歷合大業歷隋文帝時張胄元造煬帝時重造距大業四年戊辰歲至萬歷二十二年甲午歲九百八十六年以其法推大業四年天正冬至得辛未及推萬歷二十二年天正冬至得庚辰後天一日以大衍歷上考大業四年天正冬至得庚午斯法與大衍同戊寅歷唐高祖時傅仁均造距武德九年丙戌歲至萬歷二十二年甲午歲九百六十八年以其法推武德九年天正冬至得乙巳及推萬歷二十二年天正冬至得壬午後天三日以大衍歷上考武德九年天正冬至得甲辰斯法與大衍同
  hash: sha256:c9a02462aa996de247e3958d9f8f1040da2bf716a9cc8b37083a3388d1ee2c5f
