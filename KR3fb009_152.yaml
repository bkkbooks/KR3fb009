body:
  text: 土星盈者立差二秒八十三忽加平差四分十秒二十二忽減定差千五百一十四分六十一秒縮者立差三秒三十一忽加平差一分五十一秒二十六忽減定差千一百一十七十五秒木星盈縮立差二秒三十六忽加平差二分五十九秒十二分減定差千八十九分七十秒金星盈縮立差一秒四十一忽加平差三忽減定差三百五十一分五十五秒水星盈初縮末立差十一秒三十五忽減平差八十三分十一秒八十九忽減定差八千八百四十七分八十四秒縮初盈末立差八秒五十一忽減平差三分二秒三十五忽減定差二千九百九十七分六十三秒新改縮初盈末立差一秒二十四忽減平差二十分三十秒減定差四千三百九十二分各置立差以所求初末限度及分秒乘之加減平差再乘之用減定差又乘之滿萬為度不滿退除為分秒為盈縮差又法置所求初末限下小餘以其限盈縮分乘之萬約為分加入其限積度亦為盈縮差
