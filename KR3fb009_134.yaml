body:
  text: 正交減中交加雖係倍減者加減只如常求交限度日食置正交中交度及分秒以六度十五分為損益差正交損之中交益之以南北東西定差加減之為交限度月食則不須損益加減直以正交中交度及分秒為交限度求交定度置朔望泛交大小餘以月平行度乘之以盈縮差盈加縮減之為交定度若在十五度半已下併入正交度及分秒為定交度求食差視交定度在正交限巳下中交限巳上為交內在正交限巳上中交限巳下為交外各與限度相減餘為食差求所食分秒各置食限以其食差減之餘如定法而一為所食分秒不及減者不食食分少者日光赫盛或不見食求定限行度
