body:
  text: 二分八十一秒又以限乘之用減定差千一百一十一分餘再以限乘之滿萬為度不滿退除為分秒如是求次限積度相減餘為疾遲分以乘所得初末限下小餘萬約為分加入其限積度為疾遲差求疾遲限下竹度置平行度及分秒以轉象乘之八十四除之所得為一限平行度不滿退除為分秒以其限疾遲分疾初遲末益遲初疾末損損益一限平行度為所入疾遲限下行度求加減差置所求盈縮疾遲差以八百二十乘之如所入疾遲限下行度而一為分不滿退除為秒盈遲名為加差縮疾名為減差求定朔弦望置經朔弦望大小餘各以其加減差加減之滿或不足進退大餘即定朔弦望視前後定朔兩干同者前月大盡不同者前月小盡無中氣者為閏月若定朔弦望小餘在日出分巳下者退一日
