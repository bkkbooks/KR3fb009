body:
  text: 求逐更逐點中星置昏後曉中星積度不及則加躔周以曉前昏中星積度減之餘二十五而一所得爲點差置昏中星積度命爲一更一點以點差累加之滿赤道宿度去之卽逐更逐點中星宿度及分秒求九服所在漏刻各於所在以儀測驗或下水漏以定其處冬至或夏至夜刻與五十刻相減或以爲至差刻以所求日黃道出入赤道內外度及分秒求之二十三度九十分除之所得內減外正加五十刻卽所求夜刻以減百刻餘爲晝刻其九服所在逐段晝夜差半晝夜分及日出入晨昏分更點中星等率並準隨處晷漏修短依術推之折中厯法卷之三終
