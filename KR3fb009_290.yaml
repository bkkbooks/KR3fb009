body:
  text: 牛初度依近代所測也依斯法算距嘉靖甲寅歲一千一百一十七年距萬歷辛巳歲一千一百四十四年月食十一分六十二秒初虧子正初刻三更三點正東食旣丑初一刻四更二點食甚丑初三刻四更四點生光丑正初刻四更五點復圓寅初一刻五更四點正西食甚月離黃道牛初度五十一分赤道牛初度五十五分依舊法算距至元辛巳歲八百四十四年月食十一分六十二秒初虧子正初刻三更四點正東食旣丑初二刻四更三點食甚丑正初刻四更四點
