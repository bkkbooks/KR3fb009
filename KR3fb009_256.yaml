body:
  text: 右太初後天十日大衍後天一日餘與天合紹定三年庚寅歲十一月丙申日南至見元志太初丁未五十刻大衍丁酉六十五刻紀元丁酉七刻授時丙申九十三刻大統丙申九十三刻斯法丙申九十三刻右太初後天十一日大統紀元後天一日餘與天合淳祐十年庚戌歲十一月辛巳日南至見元志太初壬辰五十刻大衍壬午五十四刻紀元辛巳九十四刻授時辛已七十八刻大統辛已七十八刻斯法辛已七十八刻右太初後天十一日大衍後天一日餘與天合元至元十四年丁丑歲十一月癸卯日辰初三刻冬至見元志太初甲寅二十五刻大衍甲辰十四刻紀元癸卯五十二刻授時癸卯三十三刻大統癸卯三十三刻斯法癸卯三十二刻右太初後天十一日大衍後天一日餘與天合
