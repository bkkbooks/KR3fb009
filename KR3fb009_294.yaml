body:
  text: 月食七分三十秒初虧子正一刻三更四點東南食甚丑初三刻四更二點正南復圓寅初二刻五更一點西南食甚月離黃道奎十三度五十四分赤道奎十二度四十八分宋孝武帝大明三年九月十五日乙夜月食盡在胃宿之末以衝計之日當在氐十二同上依斯法算距嘉靖甲寅歲一千九十五年距萬歷辛巳歲一千一百二十二年月食十四分四秒初虧戌初初刻一更三點正東食既戌正初刻一更五點食甚戌正二刻二更一點生光亥初初刻二更二點復圓亥正初刻二更四點正西食甚月離黃道胃十四度七十二分赤道胃十四
