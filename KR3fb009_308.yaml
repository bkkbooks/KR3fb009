body:
  text: 距至元辛巳歲三百一十七年月食九分十八秒初虧丑初初刻四更一點正東食甚丑正一刻四更五點復圓寅正一刻五更五點正西食甚月離黃道虛六度八十六分赤道虛六度七十七分又三年巳亥歲六月癸巳夜望月食依斯法算距嘉靖甲寅歲四十五年距萬歷辛巳歲一十八年月食十一分十六秒月未出巳食七分五十九秒月巳出見食三分五十七秒初虧酉初三刻在晝正東食既戌初初刻昏刻食甚戌初二刻昏刻生光戌初三刻一更一點
