body:
  text: 日以斯法上考紹興五年天正冬至得癸酉與統元歷合乾道歷宋孝宗時劉孝榮造距乾道三年丁亥歲至萬歷二十二年甲午歲四百二十七年以其法推乾道三年天正冬至得辛酉及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考乾道三年天正冬至得辛酉與乾道歷合淳熙歷宋孝宗時劉孝榮重造距淳熙三年丙申歲至萬歷二十二年甲午歲四百一十八年以其法推淳熙三年天正冬至得戊申及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考淳熙三年天正冬至得戊申與淳熙歷合天明歷金世宗時趙和微重修乙未歷金世宗時耶律履造命日起壬甲二歷並以大定二十年庚子歲為距至萬歷二十二年甲午歲四百一十四年以其法推大定二十
