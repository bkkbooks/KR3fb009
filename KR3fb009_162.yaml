body:
  text: 太陽盈縮積為距合差日不滿退除為分秒順加退減太陽盈縮積為距合差度順合者以距合差日差度盈加縮減其星定合泛積為其星定合定積日定積度及分秒退合者以距合差日盈減縮加以距合差度盈加縮減加減其星退定合泛積為其星退定合定積日定積度及分秒如命如前各得所求日晨及盈縮分秒徑求合伏定日者土木火三星以夜半黃道日度減其星夜半黃道度餘在其日太陽行分巳下者金水二星以其星夜半黃道度減夜半黃道日度餘在其日本星行分巳下者各為其日合伏係合退伏者視其日夜半黃道日度未行到本星度及視次日太陽行過本星度而本星退行過太陽宿度者為其日合退伏求定見定伏定積日土木火三星各置定見定伏泛積日及分秒以歲中折半晨加久減之在歲中巳下自相乘巴上倍歲中反減之餘亦自相乘七十五而一為分不滿退除為秒
