body:
  text: 之重事也故厯者有常之數也不可一日而差差則之毫釐則亂天人之序乖百事之時宋歐陽修曰後世厯學一岀於陰陽之家其事則重其學則末夫修為此説者蓋傷之云耳乃天人之學律法禁之所以編著成書者少恐冒私習之禁然陰陽之學家其學有二曰推步者推其一定之氣朔乃理之常也曰占驗者占其未來之休咎乃天之變者也天之變者不許術士妄談禍福惑世誣民律法之所禁者此耳至氣朔加時之早晏則國家頒厯於四海日月交食之秒刻則所司移文於天下此古聖人欽厯象授民時之意固皆理之常者何嘗不欲人知而禁之以律乎昔漢武帝詔公孫卿壺遂司馬遷射姓等造太初厯此數人皆國之太史也然姓等奏不能為算願募民間治厯者更造密度迺選鄧平唐都洛下閎等二十餘人分部運算而厯始成若唐之戊寅大衍諸厯則又岀於釋老之徒所造宋紹興五年厯官言日食九分半虧在辰正常州布衣陳得一言當食八分半虧在已初其言卒驗遂詔得一與道士裴伯夀等更造
