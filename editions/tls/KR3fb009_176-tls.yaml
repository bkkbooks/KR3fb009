body:
  text: 分之謬不過爲合以驗天非順天以求合故也一行所謂有效於古宜合於今此乃前人定論今以諸歷下推近歲冬至差多者至十三四日少亦不下七八日其當時亦未必與天合可知也自何承天造元嘉歷測驗之後迄於授時則轉爲精密矣是故斯法上考多與之合間有不合者其説仿此元嘉歷前宋文帝時何承天造距元嘉二十年癸未歲至萬歷二十二年甲午歲千一百五十一年以其法推元嘉二十年天正冬至得乙已及推萬歷二十二年天正冬至得甲申後天五日以斯法上考元嘉二十年天正冬至得乙已與元嘉歷合大明歷前宋孝武帝時祖沖之造距大明七年癸卯歲至萬歷二十年甲午歲千一百三十一年以其法推大明七年天正冬至得庚寅及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考大明七年天正冬至得庚寅與大
