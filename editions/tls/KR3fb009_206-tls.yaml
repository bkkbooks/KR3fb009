body:
  text: 古有黃帝顓頊夏殷周魯六家之歷今皆不傳而見於史志者自漢迄元凡五十家其積年日法雖殊然用以推古今冬至則一萬歷二十一年癸已歲仲冬十一月二十九日已卯加時在夜半前冬至此冬至乃萬歷二十二年甲午歲歲首黃鍾建子之月一陽來復生物之始歷家所謂天正冬至是也今以古歷五十家之法下推甲午歲已卯日冬至其合者僅二家其不合者共四十八家內後一日者二十三家後二日者十五家後五日七日十三日者各一家後三日十四日者各二家後八日者三家以斯法上考五十家歷所距之年天正冬至則合者三十六不合者十四其不合者太初三統四分乾象景初泰始三統興和天保天和大業戊寅此十二家在大衍巳前者今以大衍歷考之皆與斯法所推周則知斯法非不合也蓋彼造歷之時測驗未密祖沖之及一行已有定論矣唐五紀
  hash: sha256:f6532420daf7b8c92750798365a1958509e37f365350ef9609fbf2a9f5972d72
