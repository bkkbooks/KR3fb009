body:
  text: 上反減躔中餘爲末限求月離半交白道出入赤道內外度置各交汎差度及分秒以二十五乘之六十一除之所得視月離黃道正交在冬至後宿度爲加皆加減二十三度九十分爲月離赤道後半交白道出入赤道內外度折半以辰策除之爲定差求月離出入赤道內外白道去極度置每日月離赤道交後初末限度及分秒用減象策餘爲白道積用其積度減之餘以其差率乘之百約之以加其下積差率每日積差月離白道積差差率舊附日躔篇黃赤道率下倍辰策以積差減之餘以定差乘之爲每日月離出入赤道內外度內減外加象策爲每日月離白道去極度及分秒求隨處月去地度及表景汎數定數置所求日月臨午位白道去極度及分併其處北極出地度及分用減躔中餘卽處其月去地度爲弧半背術與日同見晷漏篇折中厯法卷之五終
