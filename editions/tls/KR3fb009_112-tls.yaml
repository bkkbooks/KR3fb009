body:
  text: 求定朔弦望加時及每日夜半晨昏入轉置經朔弦望入轉大小餘以定朔弦望加減差加減之爲定朔弦望加時入轉以定朔弦望小餘減之爲定朔弦望晨前夜半入轉累加一日爲每日晨前夜半入轉各以其日晨分加之爲晨入轉昏分加之爲昏入轉滿轉用去之求定朔弦望加時黃道日度置經朔弦望入盈縮大小餘以加減差加減之爲定朔弦望入歷在盈便爲積日在縮加歲中爲積日命日爲度以盈縮差盈加縮減之爲加時日行定積度以歲首冬至加時黃道日度加而命之各得定朔弦望加時黃道日度及分秒求定朔弦望加時黃道月度凡定朔加時日月同度以日行定積度卽月行定積度弦望則各置其加時日行定積度以象策上弦一加望再加下弦三加之爲加時月行定積度如前加而命之滿躔周及黃道宿度去之不盡各得定朔弦望加時黃道月度及分秒
