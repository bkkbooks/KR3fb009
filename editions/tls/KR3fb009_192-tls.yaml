body:
  text: 日以其斯法上考咸平四年天正冬至得辛卯與儀天歷合乾興歷宋眞宗時張奎造命日起丁卯距乾興元年壬戌歲至萬歷二十二年甲午歲五百七十二年以其法推乾興元年天正冬至得辛已及推萬歷二十二年天正冬至得辛已後天二日以斯法上考乾興元年天正冬至得辛巳與乾興歷合崇天歷宋仁宗時宋行古造距天聖二年甲子歲至萬歷二十二年甲午歲五百七十年以其法推天聖二年天正冬至得壬辰及推萬歷二十二年天正冬至得辛巳後天二日以授時歷上考天聖二年天正冬至得辛卯斯法與授時同明天歷宋英宗時周琮等造距治平元年甲辰歲至萬歷二十二年甲午歲五百三十年以其法推治平元年天正冬至得辛酉及推萬歷二十二年天正冬至得庚辰後天一日
