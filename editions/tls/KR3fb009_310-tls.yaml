body:
  text: 復圓亥初初刻一更五點正西食甚月離黃道女七度九十二分赤道女八度三分依舊法算距至元辛巳歲三百一十八年月食十一分十六秒月未出巳食二分九十九秒月巳出見食八分十七秒初虧酉初二刻在晝正東食旣戌初初刻昏刻食甚戌初二刻昏刻生光戌初三刻一更一點復圓亥初一刻一更五點正西食甚月離黃道女七度八十三分赤道女七度九十三分按此與太建八年帶食其理相同舊法應見者爲不見應不見者爲見與斯法異焉須驗天以知疏密
