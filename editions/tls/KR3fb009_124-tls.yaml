body:
  text: 置定限度與初末限相減相乘退位爲分爲定差正交中交後爲加半交後爲減以差加減正交道赤道積度爲月離白道定積度以前宿白道定積度減之各得月離白道宿次及分求定弦望加時月離白道宿度各以月離赤道正交宿度距所求定朔弦望加時月離赤道宿度爲正交後積度滿象策去之爲半交後再去之爲中交後又去之爲半交後視交後積度在半象巳下爲初限巳上用減象策爲末限以初末限與定限度相減相乘退位爲分分滿百爲度爲定差正交中交後爲加半交後爲減以差加減月離赤道正交後積度爲定積度以正交宿度加之以其所當月離白道宿度去之各得定朔弦望加時月離白道宿度及分秒求每日月臨午位黃道宿度置月離赤道定積度及中星所臨宿積度上弦前後視昏度望前後視夜半度下弦前後視晨度月在中星巳下爲前巳上爲後以月星積度相減不及則加躔周而後
