body:
  text: 求五星平合日置歲定積各加其星合應滿其周率去之不盡反減周率餘卽所求歲首冬至後平合日及分秒求諸段積日積度副置平合日及分秒累加段日卽諸段積日命爲度累加平度退則減之卽諸段積度及分秒求諸段入歷置歲定積各以其星歷應併所求平合日及分秒加之如其度率一而爲度不滿退除爲分秒滿日躔歷率去之不盡爲所求平合入歷度累加限度各得其段入歷度及分秒求盈縮初末限置各段入歷度及分秒若在躔中巳下爲盈巳上減去躔中爲縮其土木金水四星諸段在象策已下爲初限巳上用減躔中餘爲末限其火星諸段盈者在二因辰策巳下縮者在四因辰策巳下爲初限巳上用減躔中餘爲末限求盈縮差
