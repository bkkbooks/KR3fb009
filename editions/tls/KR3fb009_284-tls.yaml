body:
  text: 復圓申初一刻東北食甚日躔黃道張八度七十一分赤道張八度八十四分魏文帝黃初二年七月十五日癸未日加壬月加丙食仝上按日加壬謂日在地中壬位月加丙謂月在天上丙位以漏刻言則亥末子初也丙字舊文作景爲避唐諱今仍作丙庶讀者易曉也依斯法算距嘉靖甲寅歲一千三百三十三年距萬歷辛已歲一千三百六十年月食八分七十秒初虧子初初刻三更一點東南食甚子正三刻三更五點正南復圓丑正一刻四更五點西南食甚月離黃道室六度九十七分赤道室六度八十分依舊法算
