body:
  text: 三百五十七年以其法推景初元年天正冬至得丁未及推萬歷二十二年天正冬至得丁亥後天八日以大衍歷上考景初元年天正冬至得申辰斯法考之與大衍同泰始歷西晉武帝時劉智造距泰始十年甲午歲至萬歷二十二年甲午歲千三百二十年以其法推春始十年天正冬至得辛酉及推萬歷二十二年天正冬至得丁亥後天八日以大衍歷上考泰始十年天正冬至得戊午斯法考之與大衍同三統歷東晉孝武帝時姜岌造距太元元年甲申歲至萬曆二十二年甲午歲千二百一十年以其法推太元九年天正冬至得戊戌及推萬曆二十年天正冬至得丁亥後天八日以大衍歷上考太元九年天正冬至得乙未斯法考之與大衍同按自前漢太初巳後至於劉宋元嘉已前諸歷所置冬至率後天三日蓋由踵三統之訛承四
