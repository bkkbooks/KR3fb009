body:
  text: 求定朔弦望夜半晨昏黃道月度置所求入轉日轉度率與次日轉度率相減轉以所求入轉小餘乘之萬約爲分前多後少減前少後多加如減轉度率爲轉定度以乘定朔弦望小餘萬約爲分用減加時定積度餘爲晨前夜半定積度以轉定度乘其日晨昏分萬約爲分各加夜半定積度爲晨昏定積度加命如前各得夜半晨昏黃道月度及分秒求每日夜半晨昏黃道月度累計相距日數轉度率爲轉積度與定朔弦望夜半相距度相減餘如相距日數而一爲日差距度多爲加距度少爲減加減每日轉度率爲行定度以累加定朔弦望夜半定積度爲每日夜半定積度累加定朔弦望晨昏定積度爲每日晨昏定積度爲每日晨昏定積度加命如前卽每日夜半晨昏黃道月度及分秒註歷自朔至望皆用昏度旣望已後則用晨度求每日夜半晨昏赤道月度視所求夜半晨昏黃道月行定積度在象策巳下爲
