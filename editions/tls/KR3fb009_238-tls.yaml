body:
  text: 右按隋書蕭吉傳云甲寅之年以辛酉冬至來年乙卯以甲子夏至冬至陽始郊天之日卽是至尊本命夏至陰始祀地之辰卽是皇后本命至尊德並乾之覆育皇后仁同地之載養所以二儀元氣並會本辰此蓋時歷傅會以媚其上非實測晷景所得也諸歷推壬戌者爲是惟太初後天六日唐貞觀十八年甲辰歲十一月乙酉景長見元志太初辛卯空刻大衍甲申四十三刻紀元甲申三十一刻授時甲申四十四刻大統甲申八十三刻斯法甲申四十七刻右太初後天六日餘皆先天一日貞觀二十三年已酉歲十一月辛亥景長見元志太初丁巳二十五刻大衍庚戌六十五刻紀元庚戌五十三刻授時庚戌六十六刻大統辛亥四刻斯法庚戌六十九刻右太初後天六日大統與天合餘皆先天一日元志授時歷議曰唐貞觀十八年甲辰歲十一
