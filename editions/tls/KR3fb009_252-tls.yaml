body:
  text: 太初丙午空刻大衍丙申八十六刻紀元丙申三十七刻授時丙申三十六刻大統丙申三十八刻斯法丙申三十五刻右太初後天十日餘與天合崇寧四年乙酉歲十一月辛丑冬至見元志太初辛亥二十五刻大衍壬寅十刻紀元辛丑六十二刻授時辛丑六十刻大統辛丑六十二刻斯法辛丑五十九刻右太初後天十日大衍後天一日餘與天合紹興二年辛亥歲十一月壬申冬至見元志太初壬午七十五刻大衍癸酉十二刻紀元壬申五十七刻授時壬申四十七刻大統壬申四十七刻斯法壬申四十七刻右太初後天十日大衍後天一日餘與天合紹熙四年癸丑歲十一月十九日壬午景長見宋志太初癸巳二十五刻大衍癸未六十一刻紀元癸未六刻授時壬午九十六刻大統壬午九十六刻斯法壬午九十五刻
