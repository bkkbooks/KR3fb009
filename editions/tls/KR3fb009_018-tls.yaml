body:
  text: 朱仲福無字無號真定靈夀人世業農父生仲福早卒仲福孩提時即能行喪禮人咸異之成童不為娛嵗岀牧牛每於鄉塾聽讀書輒曉大義從里中借書求人指示其處即其音尋之乃識字長力農養母每帶經鋤灌誦讀晝夜不輟貧不得書每從里中士借得一覽輒返人問之曰閱乎曰頗閲人無知者母卒衷毁盡禮三年不笑語鄉鄰異之邑人給事中傳鳴會知之造廬與語大奇之遂與之遊蜚譽薦紳間人皆以得見為慶舉鄉耆仲福常戴圓鞋帽衣短布衣諸士大夫贈以巾使福曰仲福本小民所戴此圓鞋帽者遵朝廷之制也一加以巾則諸公又何必與仲福遊年四十妻卒便絕慾獨處一草堂誦讀積嵗而諸士大夫家藏書殆徧如少年借里中書人每詰之曰聊涉獵耳數年後談及無一忘者每元旦登其鄉之阜曰狗台望氣輒言一嵗休咎無不奇驗人勸之著書曰天地聞道理聖賢已盡言之著書非複則偏何益况人世書未見者儘多一落筆安知非古人已
