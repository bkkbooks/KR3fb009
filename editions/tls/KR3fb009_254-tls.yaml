body:
  text: 右太初後天十一日大衍紀元後天一日餘與天合慶元三年丁已歲十一月癸卯日南至見元志太初甲寅二十五刻大衍甲辰五十九刻紀元甲辰三刻授時癸卯九十三刻大統癸卯九十三刻斯法癸卯九十二刻右太初後天十日大衍紀元後天一日餘與天合嘉泰三年癸亥歲十一月甲戌日南至見元志太初乙酉七十五刻大衍丙子五刻紀元乙亥四十九刻授時乙亥三十八刻大統乙亥三十八刻斯法乙亥三十八刻右太初後天十日大衍後天二日餘皆後天一日嘉定五年壬申歲十一月壬戌日南至見元志太初癸酉空刻大衍癸亥二十五刻紀元壬戌六十八刻授時壬戌五十七刻大統壬戌五十七刻斯法壬戌五十六刻
