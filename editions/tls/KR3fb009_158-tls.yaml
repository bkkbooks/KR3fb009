body:
  text: 前退者置後段初日行分以其日差減之爲末日行分後退者置前段末日行分以其日差減之爲初日行分以本段平行分減之餘爲增減差水星退行者半平行分爲增減差皆以增減差加減平行分爲初末日行分前多後少者加爲初減爲末前少後多者減爲初加爲末又倍增減差爲總差以日率減一除之爲日差求每日晨前夜半星行宿度各置其段初日行分以日差累損益之後少則損之後多則益之爲每日行度及分秒乃置其段初日晨前夜半定積度順加退減滿宿度去之卽每日晨前夜半星行宿度及分秒求平合見伏入太陽盈縮歷置其星其段定積日及分秒在歲中巳下爲盈巳上去之爲縮多則再去之復爲盈各在初限巳下爲初限巳上反減歲中餘爲末限卽其星平合見伏入歷日及分秒求平合見伏星與太陽行差
