body:
  text: 建德三年甲午歲十一月二十日丁丑景長見隋志太初癸未五十刻大衍丁丑三十二刻紀元丁丑二十五刻授時丁丑三十六刻大統丁丑八十五刻斯法丁丑四十二刻右太初後天六日餘與天合建德六年丁酉歲十一月二十三日壬辰景長隋志太初已亥二十五刻大衍癸巳五刻紀元壬辰九十九刻授時癸巳九刻大統癸巳七十九刻斯法癸巳十五刻右太初後天七日紀元與天合餘皆後一日右唐志大衍歷議云建德六年以壬辰景長而麟德開元皆得癸已開皇七年以癸未景短而麟德開元皆得壬午先後相戾不可叶也皆日行盈縮使然凡歷術在於常數不在於變行旣叶中行之率則可以兩齊先後之變矣宣政元年戊戌歲十一月初五日戊戌景長仝上太初甲辰五十刻大衍戊戌三十刻紀元戊辰二十五刻授時戊戌三十三刻
