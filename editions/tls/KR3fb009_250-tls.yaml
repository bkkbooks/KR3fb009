body:
  text: 大統丁丑七十四刻斯法丁丑七十一刻右太初後天十日大衍後天一日餘與天合元祐五年庚午歲十一月壬午冬至見元志太初壬辰五十刻大衍癸未四十四刻紀元壬午九十六刻授時壬午九十六刻大統壬午九十八刻斯法壬午九十五刻右太初後天十日大衍後天一日餘與天合元祐七年壬申歲十一月癸巳冬至見元志太初癸卯空刻大衍癸巳九十二刻紀元癸已四十五刻授時癸巳四十五刻大統癸巳四十七刻斯法癸已四十三刻右太初後天十日餘與天合元符元年戊寅歲十一月甲子冬至見元志太初甲戌五十刻大衍乙丑三十九刻紀元甲子九十一刻授時甲子九十刻大統甲子九十二刻斯法甲子八十九刻右太初後天十日大衍後天一日餘與天合崇寧三年甲申歲十一月丙申冬至見元志
