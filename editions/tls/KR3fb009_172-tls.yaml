body:
  text: 略無盈縮以率計之二氣各退二日十二刻則晷景之數立冬更短立春更長並差二寸二氣中景俱長九尺八寸矣卽立冬立春之正日也以此推之歷置冬至後天亦二日十二刻也熹平三年時歷丁丑冬至加時正在日中以二日十二刻減之天定以乙亥冬至加時在夜半後三十八刻尋古曆法並同四分四分之數久則後天經三百年朔差一日是以漢載四百食率在晦魏代已來遂革其法世莫之非者誠有效於天也乾象曆漢獻帝時劉洪造距建安十一年丙戌歲至萬曆二十二年甲午歲千三百八十八年以其法推建安十一年天正冬至得乙丑及推萬曆二十二年天正冬至得丙戍後天七日以大衍曆上考建安十一年天正冬至得壬戍斯法考之與大衍同景初歷魏明帝時楊偉造距景初元年丁巳歲至萬歷二十二年甲午歲千
