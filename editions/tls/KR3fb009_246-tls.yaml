body:
  text: 太初戊申四刻斯法丁未九十九刻右太初後天九日大衍大統與天合餘皆先天一日皇祐二年庚寅歲五月二十五日辛亥景短見宋志太初巳未八十七刻大衍辛亥四刻紀元庚戌六十刻授時庚戌六十一刻大統庚戌六十六刻斯法庚戌六十一刻右太初後天八日大衍與天合餘皆先天一日是年十一月三十日癸丑景長見宋志太初壬戌五十刻大衍癸丑六十六刻紀元癸丑二十二刻授時癸丑二十三刻大統癸丑二十八刻斯法癸丑二十三刻右太初後天九日餘與天合皇祐四年壬辰歲五月十七日辛酉景短見宋志太初庚午三十七刻大衍辛酉五十三刻紀元辛酉八刻授時辛酉十刻大統辛酉十四刻斯法辛酉十刻右太初後天九日餘與天合
