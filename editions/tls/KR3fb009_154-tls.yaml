body:
  text: 求諸段定積日及日辰各置其段積日以其盈縮差盈加縮減之卽其段定積及日分秒以歲首黃鍾征律大小餘加之滿旬周去之其大餘命甲子算外卽得日辰及加時小餘求諸段所在月日各置其段定積日及分秒加閏餘減朔策餘如朔策而一爲月數不盡爲入經朔巳來日數其月數命正月若在朔策巳下不及減者爲入年前十一月巳上去之爲入十二月俱以日辰所在爲定凡閏餘在十六日巳上則其年有閏依求汎閏術定之求諸段加時定積度各置其段積度以其盈縮差盈加縮減之金星再之火星三之卽諸段加時定積度以歲首冬至加時黃道日度加而命之卽其星其段加時所在宿度及分秒求諸段初日晨前夜半所在宿度各以其段初行率乘其段加時小餘百約爲分順減退加其日加時定積度卽其段初日晨前夜半定積度加命如前卽得所在宿度及分秒
