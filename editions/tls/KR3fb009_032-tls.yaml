body:
  text: 靈夀朱仲福纂錄邑後學傳宗善校字步發斂第一萬歷甲寅歲爲歷元夫甲寅者卽所謂閼逢攝提格之歲也古人歷法多以此爲距算蓋甲寅於五行爲木於五常爲仁木爲五行之始仁爲五常之首是故重之斷取近距命爲元也元紀四千五百六十紀卽元也四千五百六十者五行相代一終之大數也自堯元年甲辰歲推而上之六百五十年得此甲寅歲命爲元也朞實千四百六十一後漢志曰歷數之生也乃立儀表以校日景景長則日遠天度之端也日發其端周而爲歲然其景不復初四周千四百六十日而景復初是則日行之終以周初日得三百六十五餘四分之一爲歲
