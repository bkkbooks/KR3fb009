body:
  text: 日食八分六十六秒初虧辰初初刻西北食甚辰正一刻正北復圓巳初三刻東北食甚日躔黃道胃十二度二十一分赤道胃十二度十四分依舊法算距至元辛巳歲三百二十二年日食七分九十八秒初虧辰初二刻西北食甚辰正四刻正北復圓巳正一刻東北食甚日躔黃道胃十二度十三分赤道胃十二度六分又本年癸卯歲十月戊戌夜望月食依斯法算距嘉靖甲寅歲四十九年距萬歷辛巳歲二十二年
