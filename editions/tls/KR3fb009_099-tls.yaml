body:
  text: 除之爲弧半背卽其處日去地度及分秒如不同更增損矢數算之以同爲矢定數求每日隨處中晷汎數置五十八度十一分減去所求矢定數餘用八因爲實復以矢與百一十六度二十二分相減相乘平方開之爲法除實命度爲尺卽其日其處中晷汎數求每日隨處中晷定數各與其處立八尺表每日實測午晷眞數而與算術所求晷數相餘名爲地形差所測晷數多則爲加少則爲減加減所算晷數卽其日其處中晷定數求二至加時眞數取二至前後晷數近似者相減餘以百刻乘之爲實取其次日晷數相減餘爲法實如法而一爲刻求冬至視其前晷多則爲減差少則爲加差夏至反之總計距日刻數以差加減折半加五十刻爲前距定日以其日算外命之卽二至加時眞數求每日半晝夜及日出入晨昏分置所求初未限滿積度去之餘以其段晝夜差乘之
