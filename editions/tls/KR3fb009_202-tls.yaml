body:
  text: 卯及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考開禧三年天正冬至得辛卯與開禧歷合庚午歷元太祖時耶律楚材造命日起壬辰距元太祖十五年庚辰歲至萬歷二十二年甲午歲三百七十四年以其法推元太祖十五年天正冬至得已亥及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考元太祖十五年天正冬至得巳亥與庚午歷合按元太祖以宋寧宗開禧二年丙寅歲卽位其十五年歲次庚辰乃宋寧宗嘉定十三年庚辰歲也元太祖在位無庚辰年元志以爲太宗誤矣淳祐歷宋理宗時李德卿造距淳祐十年庚戌歲至萬歷二十二年甲午歲三百四十四年以其法推淳祐十年天正冬至得丙子及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考淳祐十年天正冬至得丙子與淳
