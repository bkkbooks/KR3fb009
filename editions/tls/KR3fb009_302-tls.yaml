body:
  text: 古今交食考第十三自萬歷二十二年甲午起又二年丙申歲三月壬午夜望月食依斯法算距嘉靖甲寅歲四十二年距萬歷辛巳歲一十五年月食三分七十秒月未入巳復二分六秒月巳入不見復一分六十秒初虧寅初三刻五更三點東北食甚寅正三刻曉刻正北復圓卯初三刻在晝西北食甚月離黃道角五度六分赤道角四度七十六分依舊算法距至元辛巳歲三百一十五年月食三分七十一分
