body:
  text: 統元暦宋自太宗以後往往徴民間知厯者與之議厯故孝宗曰朝士鮮知星厯者不必專領迺詔有通天文厯算者所在州軍以聞以此觀之可見厯數之學累代不禁查大明會典内一欵天文地理藝術之人禮部務要備知以憑取用仍行天下訪取考驗牧用宏治十年嘉靖元年皆行之使天下保舉精通天文暦法者是知律非禁人習學暦法耳愚今採厯代諸史志中所謂厯者五十餘家考其異同辨其疎密但以未見大統厯全書為歉後讀邱濬所撰大學衍義補内載大統厯氣閏轉交四准分秒以為大統厯經全文未見而其大略在此矣然大統與授時二厯相較考古則氣差三日推今則時差九刻夫二厯者必有一是苟非測景驗氣孰真孰誤何由得知而洪儀鉅表非外郡所有且冬夏二至大餘未差差在數刻之間而以草野口舌爭之實難憑信唯萬厯辛已嵗十一月冬至大統在丁丑日而授時在丙子乙酉嵗冬至大統在戊戌授時在丁酉丙申嵗夏至大統在癸已授時在壬辰庚子嵗夏至大統在甲寅授時
