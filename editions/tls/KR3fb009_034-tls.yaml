body:
  text: 之日數也歲差歲餘後漢志註引杜預長歷曰天行不息日月星辰各運其舍皆動物也行度大量可得而限累日爲月新故相序不得不有毫毛之差此自然之理也理旣不得一而算守恒數故歷無不有差失也始差於毫毛而尙未能覺積而成多以失弦望晦朔則不得不改憲以從之朱子曰日躔漸退故歲餘漸縮今人只説天運有差天豈得差自是運行合當如此許衡曰古今歷法合於今必不能通於古密於古必不能驗於今故授時歷考往則增歲餘而損歲差則推來則增歲差而損歲餘上推春秋巳來冬至皆合下求方來可以永久無弊非止密於今日而巳余以爲歷家所謂歲差者有三曰日躔歲差曰五星歲差曰節氣歲差前代諸歷但有日躔差五星差其節氣差則自統天授時二家始焉斯法因之而頗不同蓋授時每年差二秒統天差二秒有奇斯法不及二秒而歲周氣象等率皆活
