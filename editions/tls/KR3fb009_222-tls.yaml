body:
  text: 元嘉十五年戊寅歲十一月十八日甲申景長見隋志太初已丑五十刻大衍甲申八刻紀元甲申十二刻授時甲申二十刻大統甲申八十七刻斯法甲申二十五刻右太初後天五日餘與天合元嘉十六年巳卯歲十一月二十九日已丑景長隋志太初甲午七十三刻大衍巳丑三十三刻紀元已丑三十七刻授時已丑四十四刻大統庚寅十刻斯法已丑五十刻右太初後天五日大統後天一日餘與天合元嘉十七年庚辰歲十一月初十日甲午景長隋志太初庚子空刻大衍甲午五十七刻紀元甲午六十一刻授時甲午六十八刻大統乙未三十六刻斯法甲午七十四刻右太初後天六日大統後天一日餘與天合元嘉十八年辛巳歲十一月二十一日已亥景長隋志太初乙已二十五刻大衍巳亥八十二刻紀元已亥八十五刻授時已亥九十三刻
