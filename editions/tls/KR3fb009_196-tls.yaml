body:
  text: 日以斯法上考崇寧二年天正冬至得乙酉與占天歷合紀元歷宋徽宗時姚舜輔重造命日起已卯距崇寧五年丙戌歲至萬歷二十二年甲午歲四百八十八年以其法推崇寧五年天正冬至得辛丑及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考崇寧五年天正冬至得辛丑與紀元歷合大明歷金熙宗時楊級造距天會五年丁未歲至萬歷二十二年甲午歲四百六十七年以其法推天會五年天正冬至得辛卯及推萬歷二十二年天正冬至得庚辰後天一日以斯法上考天會五年天正冬至得辛卯與大明歷合統元歷宋高宗時陳得一造距紹興五年乙卯歲至萬歷二十二年甲午歲四百五十九年以其法推紹興五年天正冬至得癸酉及推萬歷二十二年天正冬至得庚辰後天一
