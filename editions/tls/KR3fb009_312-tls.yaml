body:
  text: 又二年辛丑歲十一月已酉夜望月食依斯法算距嘉靖甲寅歲四十七年距萬歷辛巳歲二十年月食七分八十九秒初虧丑初初刻三更五點東南食甚丑正二刻四更三點正南復圓寅初三刻四更五點西南食甚月離黃道畢十四度六分赤道畢十四度九十三分依舊法算距至元辛巳歲三百二十年月食七分八十九秒初虧丑初初刻三更五點東南食甚丑正二刻四更三點正南復圓寅正一刻五更一點西南食甚月離黃道畢十三度九十六分赤道畢十四度八十三分
