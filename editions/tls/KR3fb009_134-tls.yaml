body:
  text: 正交減中交加雖係倍減者加減只如常求交限度日食置正交中交度及分秒以六度十五分爲損益差正交損之中交益之以南北東西定差加減之爲交限度月食則不須損益加減直以正交中交度及分秒爲交限度求交定度置朔望汎交大小餘以月平行度乘之以盈縮差盈加縮減之爲交定度若在十五度半已下併入正交度及分秒爲定交度求食差視交定度在正交限巳下中交限巳上爲交內在正交限巳上中交限巳下爲交外各與限度相減餘爲食差求所食分秒各置食限以其食差減之餘如定法而一爲所食分秒不及減者不食食分少者日光赫盛或不見食求定限行度
