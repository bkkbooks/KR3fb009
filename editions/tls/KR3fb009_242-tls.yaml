body:
  text: 右太初後天七日大統後天一日餘與天合開元十年壬戌歲十一月癸酉景長仝上太初庚辰五十刻大衍癸酉四十九刻紀元癸酉三十一刻授時癸酉四十六刻大統癸酉七十四刻斯法癸酉四十七刻右太初後天七日餘與天合開元十一年癸亥歲十一月戊寅景長見元志太初乙酉七十五刻大衍戊寅七十四刻紀元戊寅五十五刻授時戊寅七十刻大統戊寅九十八刻斯法戊寅七十一刻右太初後天七日餘與天合開元十二年甲子歲十一月癸未景長見元志太初辛卯空刻大衍癸未九十八刻紀元癸未八十刻授時癸未九十五刻大統甲申二十二刻斯法癸未九十六刻右太初後天八日大衍後天一日餘與天合折中厯法卷之十終
