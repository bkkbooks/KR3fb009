body:
  text: 依舊法算距至元辛巳歲三百二十一年月食十三分二十九秒月未出巳食二分五十九秒月巳出見食十分七十秒初虧申初初刻在晝正東食旣申正一刻在晝食甚酉初初刻昏刻生光酉初二刻一更一點復圓酉正二刻一更四點正西食甚月離黃道畢二度八十四分赤道畢二度九十八分按食旣在晝則月出巳旣矣是知舊法所推帶食分誤又一年癸卯歲四月丁亥朔日食依斯法算距嘉靖甲寅歲四十九年距萬歷辛巳歲二十二年
