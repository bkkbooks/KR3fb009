body:
  text: 度四分依舊法算距至元辛巳歲八百二十一年月食十四分四秒初虧酉正三刻一更二點正東食旣戌初四刻一更五點食甚戌正二刻二更一點生光亥初初刻二更二點復圓亥正一刻二更五點正西食甚月離黃道胃十四度一分赤道胃十三度四十一分陳宣帝太建八年丙申六月戊申朔食於卯甲間見元史歷志謹按二十四向寅末卯初是名曰甲然則卯甲間者謂卯初之後卯正之前也依斯法算距嘉靖甲寅歲九百七十八年距萬歷辛巳歲一千五年
