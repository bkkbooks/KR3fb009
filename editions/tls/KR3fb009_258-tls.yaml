body:
  text: 至元十五年戊寅歲五月乙已日亥正三刻夏至見元志太初丙辰八十七刻大衍丙午七十六刻紀元丙午十四刻授時乙已九十五刻大統已已九十五刻斯法乙已九十五刻右太初後天十一日大衍紀元後天一日餘與天合是年十一月戊申日未初三刻冬至見元志太初己未五十刻大衍已酉三十八刻紀元戊申七十六刻授時戊申五十七刻大統戊申五十七刻斯法戊申五十七刻右太初後天十七日大衍後天一日餘與天合至元十六年已卯歲五月辛亥日寅正二刻夏至見元志太初壬戌十二刻大衍壬子二刻紀元辛亥三十九刻授時辛亥九刻大統辛亥十九刻斯法辛亥十九刻右太初後天十一日大衍後天一日餘與天合
