body:
  text: 月乙酉景長諸歷得甲申二十三年已酉歲十一月辛亥景長諸歷皆得庚戌大衍歷議以永淳開元冬至推之知前二冬至乃史官依時歷以書必非候景所得所以不合耳龍朔二年壬戌歲十一月戊午景長元志太初乙丑五十刻大衍戊午八十三刻紀元戊午六十九刻授時戊午八十二刻大統已未十九刻斯法戊午八十六刻右太初後天七日大統後天一日餘與天合儀鳳元年丙子歲十一月壬申景長見元志太初已卯空刻大衍壬申二十五刻紀元壬申十刻授時壬申二十二刻大統壬申五十九刻斯法壬申二十七刻右太初後天七日餘與天合永淳元年壬午歲十一月癸卯景長見元志太初庚戌五十刻大衍癸卯七十二刻紀元癸卯五十七刻授時癸卯七十四刻大統甲辰四刻斯法癸卯七十三刻
