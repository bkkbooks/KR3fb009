body:
  text: 求諸段日率度率及平行分各以其段日晨與後段日辰相距數爲日率以其段夜半積度與後段夜半積度相減餘爲度率各置度率及分秒以其日率除之卽其段平行分求諸段增減差及月差以本段前後平行分相減爲其段汎差倍而退位爲增減差前多後少者加爲初減爲末前少後多者減爲初加爲末以加減其段平行分爲初末日行分又倍增減差爲總差以日率減一除之爲日差求前後伏遲退段增減差前伏者置後段初日行加其日差之半爲未日行分後伏者置前段未日行分加其日差之半爲初日行分以減伏段平行分餘增減差前遲者置前段未日行分倍其日差減之爲初日行分後遲者置後段初日行分倍其日差減之爲未日行分以前後近留之段平行分減之餘爲增減差土木火三星退行者六因平行分退一位爲增減差金星前後退伏者三因平行分半而退位爲增減差
