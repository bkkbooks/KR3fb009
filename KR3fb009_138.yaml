body:
  text: 五限諸分昏分巳上減昏分晨分巳下加晨分以更法加入如法而一為更數不滿以點法加入如法而一為點數求帶食帶復視其日日出入分在初虧分巳上食甚分巳下為帶食在食甚分巳上復圖分巳下為帶復各與日出入分相減餘名前後差在日出入分巳下為前巳上為後各以所食分秒乘之如定用分而一為日出入前後食復分日食日出已後日入已前為見日出巳前日入巳後為不見月食日出已前日入已後為見日出巳後日入已前為不見此與舊法不同詳見古今交食考舊歷無論出入前後日月一例求之是屬錯誤求起復方所日食起於西復於東食分少者交外偏南交內偏北月食起於東復於西食分少者交外偏北交內偏南皆指北極所在為北日月所在為南不必據午地論舊歷日月食八分巳上即言正東正西今惟月食十
