body:
  text: 在癸丑甲辰嵗夏至大統在乙亥授時在甲戌庚戌嵗冬至大統在已酉授時在戊申甲寅嵗冬至大統在庚午授時在已巳戊午嵗冬至大統在辛卯授時在庚寅乙丑嵗夏至大統在乙丑授時在甲子已巳嵗夏至大統在丙戍授時在乙酉癸酉嵗夏至大統在丁未授時在丙午丁丑嵗夏至大統在戊辰授時在丁卯癸未嵗冬至大統在壬寅授時在辛丑丁亥嵗冬至大統在癸亥授時在壬戍辛卯嵗冬至大統在甲申授時在癸未戊戍嵗夏至大統在戊午授時在丁巳壬寅嵗夏至大統在已卯授時在戊寅丙午嵗夏至大統在庚子授時在已亥庚戌嵗夏至大統在辛酉授時在庚甲此皆相差一日而晷最易辨假若授時差固不必較萬一大統厯差則干係甚重也相差九刻雖不為多若在旦暮之間所差不過一辰若處夜半之際所差便隔一日夫氣節差天一日則置閏差天一月閏差一月則時差一季時差一季則嵗差一年其所差者豈小小而已哉自萬厯九年以來七八十年之間所差如此過此已後其差可知夫
